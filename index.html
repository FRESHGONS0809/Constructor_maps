/** Validate project data structure for safety */
function validateProject(project){
  if(!project || typeof project !== 'object') 
    throw new Error('Файл не похож на проект');
  
  // Validate settings
  if(project.settings){
    const s = project.settings;
    if(s.panX && (typeof s.panX !== 'number' || !isFinite(s.panX))) s.panX = 0;
    if(s.panY && (typeof s.panY !== 'number' || !isFinite(s.panY))) s.panY = 0;
    if(s.zoom && (typeof s.zoom !== 'number' || !isFinite(s.zoom))) s.zoom = 1;
    if(s.colorFriendly && typeof s.colorFriendly !== 'string') delete s.colorFriendly;
    if(s.colorEnemy && typeof s.colorEnemy !== 'string') delete s.colorEnemy;
    if(s.exportScale && typeof s.exportScale !== 'number') delete s.exportScale;
    if(s.activeForce && !['friendly','enemy'].includes(s.activeForce)) s.activeForce = 'friendly';
  }
  
  // Handle legacy format (single sheet with elements/images arrays)
  if(Array.isArray(project.elements) || Array.isArray(project.images)){
    project.sheets = [{
      id: 1,
      name: 'Лист 1',
      elements: project.elements || [],
      images: project.images || [],
      panX: project.settings?.panX || 0,
      panY: project.settings?.panY || 0,
      zoom: project.settings?.zoom || 1,
      history: [],
      redoStack: []
    }];
    project.currentSheetId = 1;
  }
  
  // Validate sheets array
  if(!Array.isArray(project.sheets)) project.sheets = [];
  project.sheets = project.sheets.filter(sheet => 
    sheet && typeof sheet === 'object' && 
    typeof sheet.id === 'number' &&
    Array.isArray(sheet.elements) && 
    Array.isArray(sheet.images)
  );
  
  // Validate and sanitize each sheet's elements
  project.sheets.forEach(sheet => {
    sheet.elements = sheet.elements.filter(el => 
      el && typeof el === 'object' && 
      typeof el.type === 'string' && 
      el.data && typeof el.data === 'object'
    );
    
    // Sanitize labels to prevent XSS
    sheet.elements.forEach(el => {
      if(el.label) el.label = escapeHtml(el.label);
      if(el.data && el.data.label) el.data.label = escapeHtml(el.data.label);
    });
    
    // Validate images
    sheet.images = sheet.images.filter(img =>
      img && typeof img === 'object' &&
      typeof img.dataUrl === 'string' &&
      typeof img.cx === 'number' && typeof img.cy === 'number' &&
      typeof img.w === 'number' && typeof img.h === 'number'
    );
  });
  
  // Ensure at least one sheet exists
  if(project.sheets.length === 0){
    project.sheets = [{ id: 1, name: 'Лист 1', elements: [], images: [], panX: 0, panY: 0, zoom: 1, history: [], redoStack: [] }];
    project.currentSheetId = 1;
  }
  
  // Validate currentSheetId
  if(!project.currentSheetId || !project.sheets.find(s => s.id === project.currentSheetId)){
    project.currentSheetId = project.sheets[0].id;
  }
  
  return project;
}

function applyProject(project){
  try {
    // Validate and sanitize project data
    project = validateProject(project);
    
    // Clear DOM properly
    while(elemGroup.firstChild) elemGroup.removeChild(elemGroup.firstChild);
    while(imgGrp.firstChild) imgGrp.removeChild(imgGrp.firstChild);
    while(selGrp.firstChild) selGrp.removeChild(selGrp.firstChild);
    while(previewGrp.firstChild) previewGrp.removeChild(previewGrp.firstChild);
    
    // Clear wide arrow masks to prevent memory leaks
    clearWideArrowMasks();
    
    // Reset state
    elements = []; 
    images = []; 
    selectedIds.clear(); 
    selectedImgId = null; 
    imgDrag = null; 
    dragState = null; 
    resizeState = null; 
    history = [];
    redoStack = [];

    const s = project.settings || {};
    panX = finiteNumber(s.panX, 0); 
    panY = finiteNumber(s.panY, 0); 
    zoom = clamp(finiteNumber(s.zoom, 1), 0.04,23);
    
    if(s.colorFriendly) document.getElementById('colorFriendly').value = s.colorFriendly;
    if(s.colorEnemy) document.getElementById('colorEnemy').value = s.colorEnemy;
    // exportScale is no longer stored in a persistent UI element, so we skip setting it
    activeForce = s.activeForce === 'enemy' ? 'enemy' : 'friendly';

    // Load sheets
    sheets = (project.sheets || []).map(s => ({
      ...s,
      history: s.history || [],
      redoStack: s.redoStack || []
    }));
    currentSheetId = project.currentSheetId || (sheets.length > 0 ? sheets[0].id : 1);
    
    // Load the current sheet's data
    const currentSheet = sheets.find(sh => sh.id === currentSheetId);
    if(currentSheet){
      elements = [...(currentSheet.elements || [])];
      images = [...(currentSheet.images || [])];
      panX = currentSheet.panX || panX;
      panY = currentSheet.panY || panY;
      zoom = currentSheet.zoom || zoom;
    }
    
    // Clear arrays to be repopulated properly
    elements = [];
    images = [];
    
    // Restore images first
    (currentSheet?.images || []).forEach(restoreImage);
    
    // Restore elements and rebuild the elements array
    (currentSheet?.elements || []).forEach(snap => {
      const data = cloneData(snap.data || {});
      const rawId = Number(snap.id);
      const id = Number.isFinite(rawId) && rawId > 0 ? rawId : nextId++;
      const g = spawnEl({id: id, type: snap.type, data: data, label: snap.label || ''});
      elemGroup.appendChild(g);
      elements.push({id: id, type: snap.type, data: data, el: g, label: snap.label || ''});
    });

    const maxElId = elements.length ? Math.max(...elements.map(e => e.id)) : 0;
    const maxImgId = images.length ? Math.max(...images.map(i => i.id)) : 0;
    nextId = Math.max(Number(project.nextId || 1), maxElId + 1);
    imgNextId = Math.max(Number(project.imgNextId || 1), maxImgId + 1);
    
    // Restore history for current sheet
    loadSheetHistory();
    
    setForceSide(activeForce);
    setTool('select');
    lastDecorZoom = null;
    updateTransform();
    updateUndoRedoButtons();
    updateImageInteractivity();
    renderSheetTabs();
    
    showToast(`Проект загружен: ${sheets.length} листов, ${elements.length} элементов, ${images.length} карт`, 'success');
  } catch(err) {
    console.error('Error applying project:', err);
    throw new Error('Ошибка применения проекта: ' + escapeHtml(err.message));
  }
}

function loadProject(file){
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      applyProject(JSON.parse(e.target.result));
      showToast(`Проект загружен: ${elements.length} элементов, ${images.length} карт`,'success');
    }catch(err){
      showToast('Ошибка загрузки проекта: '+err.message,'error');
    }
  };
  reader.readAsText(file,'utf-8');
}

document.getElementById('projectInput').addEventListener('change', function(e){
  if(e.target.files && e.target.files[0]){
    loadProject(e.target.files[0]);
    this.value = '';
  }
});

// ─── ELEMENT BUILDERS ────────────────────────────────────────────────────
function setPathStyle(el,color,width,dash){
  el.setAttribute('stroke',color); el.setAttribute('stroke-width',width||2);
  el.setAttribute('fill','none'); el.setAttribute('stroke-linecap','round');
  el.setAttribute('stroke-linejoin','round'); el.setAttribute('vector-effect','non-scaling-stroke');
  if(dash) el.setAttribute('stroke-dasharray',dash);
}

function makeArrowHead(pts,color){
  const last=pts[pts.length-1],prev=pts[pts.length-2];
  const angle=Math.atan2(last.y-prev.y,last.x-prev.x), hs=13/zoom, spread=.46;
  const tip=NS('polygon');
  tip.setAttribute('points',`${last.x},${last.y} ${last.x-hs*Math.cos(angle-spread)},${last.y-hs*Math.sin(angle-spread)} ${last.x-hs*Math.cos(angle+spread)},${last.y-hs*Math.sin(angle+spread)}`);
  tip.setAttribute('fill',color); tip.setAttribute('stroke-linejoin','round'); tip.setAttribute('vector-effect','non-scaling-stroke'); tip.style.pointerEvents='none';
  return tip;
}

function buildFlexArrow(pts,dashed,color){
  const g=NS('g'); g.dataset.label='';
  const d=smoothPath(pts);
  const path=NS('path'); path.setAttribute('d',d);
  setPathStyle(path,color,3.5,dashed?'10,7':null); path.style.cursor='move'; g.appendChild(path);
  if(pts.length>=2) g.appendChild(makeArrowHead(pts,color));
  return g;
}
function buildLine(start,end,color){
  const g=NS('g'); g.dataset.label='';
  const line=NS('line'); line.setAttribute('x1',start.x); line.setAttribute('y1',start.y);
  line.setAttribute('x2',end.x); line.setAttribute('y2',end.y);
  setPathStyle(line,color,2); line.style.cursor='move'; g.appendChild(line); return g;
}
function buildArea(pts,color){
  const g=NS('g'); g.dataset.label='';
  const d='M'+pts.map(p=>`${p.x.toFixed(1)},${p.y.toFixed(1)}`).join('L')+'Z';
  const path=NS('path'); 
  path.setAttribute('d',d);
  path.setAttribute('fill',color); 
  path.setAttribute('fill-opacity','.15');
  path.setAttribute('stroke',color); 
  path.setAttribute('stroke-width',2);
  path.setAttribute('stroke-linejoin','round');
  path.setAttribute('vector-effect','non-scaling-stroke'); 
  path.style.cursor='move';
  g.appendChild(path); 
  return g;
}
function buildPoint(pt,color){
  const g=NS('g'); g.dataset.label='';
  const circle=NS('circle'); 
  circle.setAttribute('cx',pt.x); circle.setAttribute('cy',pt.y);
  circle.setAttribute('r',6); circle.setAttribute('fill',color);
  circle.setAttribute('stroke',color); circle.setAttribute('stroke-width',1.5);
  circle.setAttribute('vector-effect','non-scaling-stroke'); circle.style.cursor='move';
  g.appendChild(circle); return g;
}
function buildMarker(pts,color){
  const g=NS('g'); g.dataset.label='';
  const path=NS('path'); path.setAttribute('d',smoothPath(pts));
  path.setAttribute('stroke',color); path.setAttribute('stroke-width',18);
  path.setAttribute('fill','none'); path.setAttribute('stroke-linecap','round');
  path.setAttribute('stroke-linejoin','round'); path.setAttribute('opacity','0.38');
  path.setAttribute('vector-effect','non-scaling-stroke'); path.style.cursor='move';
  g.appendChild(path); return g;
}
function buildMineField(pts,color){
  const g=NS('g'); g.dataset.label='';
  const d=smoothPath(pts);
  const bg=NS('path'); bg.setAttribute('d',d); setPathStyle(bg,color,12,'7,5');
  bg.setAttribute('opacity','0.45'); bg.style.cursor='move'; g.appendChild(bg);
  const fg=NS('path'); fg.setAttribute('d',d); setPathStyle(fg,color,1.5,'3,4');
  fg.style.pointerEvents='none'; g.appendChild(fg);
  const sp=20/zoom; let ac=0,lc=0;
  for(let i=1;i<pts.length;i++){ const sl=dist(pts[i-1],pts[i]); ac+=sl;
    while(ac-lc>=sp){ const t=clamp((lc+sp-(ac-sl))/sl,0,1);
      const mx=pts[i-1].x+(pts[i].x-pts[i-1].x)*t, my=pts[i-1].y+(pts[i].y-pts[i-1].y)*t;
      const c=NS('circle'); c.setAttribute('cx',mx); c.setAttribute('cy',my);
      c.setAttribute('r', Math.max(4, 4)); c.setAttribute('fill','none'); c.setAttribute('stroke',color);
      c.setAttribute('stroke-width',1); c.setAttribute('vector-effect','non-scaling-stroke');
      c.style.pointerEvents='none'; g.appendChild(c); lc+=sp; } }
  return g;
}
function buildTrench(pts,color){
  const g=NS('g'); g.dataset.label='';
  const d=smoothPath(pts); const main=NS('path'); main.setAttribute('d',d);
  setPathStyle(main,color,3); main.setAttribute('opacity','0.85'); main.style.cursor='move'; g.appendChild(main);
  const sp=10/zoom; let ac=0,lc=0;
  for(let i=1;i<pts.length;i++){ const sl=dist(pts[i-1],pts[i]); ac+=sl;
    while(ac-lc>=sp){ const t=clamp((lc+sp-(ac-sl))/sl,0,1);
      const mx=pts[i-1].x+(pts[i].x-pts[i-1].x)*t, my=pts[i-1].y+(pts[i].y-pts[i-1].y)*t;
      const angle=Math.atan2(pts[i].y-pts[i-1].y,pts[i].x-pts[i-1].x)-Math.PI/2, hs=7/zoom;
      const tick=NS('line'); tick.setAttribute('x1',mx); tick.setAttribute('y1',my);
      tick.setAttribute('x2',mx+hs*Math.cos(angle)); tick.setAttribute('y2',my+hs*Math.sin(angle));
      tick.setAttribute('stroke',color); tick.setAttribute('stroke-width',1.5);
      tick.setAttribute('vector-effect','non-scaling-stroke'); tick.setAttribute('opacity','0.7');
      tick.style.pointerEvents='none'; g.appendChild(tick); lc+=sp; } }
  return g;
}
function buildBoundary(pts,color){
  const g=NS('g'); g.dataset.label='';
  const d=smoothPath(pts); const main=NS('path'); main.setAttribute('d',d);
  setPathStyle(main,color,2.6,'13,5'); main.style.cursor='move'; g.appendChild(main);
  const sp=18/zoom; let ac=0,lc=0;
  for(let i=1;i<pts.length;i++){ const sl=dist(pts[i-1],pts[i]); ac+=sl;
    while(ac-lc>=sp){ const t=clamp((lc+sp-(ac-sl))/sl,0,1);
      const mx=pts[i-1].x+(pts[i].x-pts[i-1].x)*t, my=pts[i-1].y+(pts[i].y-pts[i-1].y)*t;
      const angle=Math.atan2(pts[i].y-pts[i-1].y,pts[i].x-pts[i-1].x)-Math.PI/2, len=13/zoom;
      const tick=NS('line'); tick.setAttribute('x1',mx); tick.setAttribute('y1',my);
      tick.setAttribute('x2',mx+len*Math.cos(angle)); tick.setAttribute('y2',my+len*Math.sin(angle));
      tick.setAttribute('stroke',color); tick.setAttribute('stroke-width',2);
      tick.setAttribute('vector-effect','non-scaling-stroke'); tick.setAttribute('opacity','.9');
      tick.style.pointerEvents='none'; g.appendChild(tick); lc+=sp; } }
  return g;
}
function makeArrowHeadAt(tip,base,color){
  const angle=Math.atan2(tip.y-base.y,tip.x-base.x), hs=10/zoom, spread=.45;
  const poly=NS('polygon');
  poly.setAttribute('points',`${tip.x},${tip.y} ${tip.x-hs*Math.cos(angle-spread)},${tip.y-hs*Math.sin(angle-spread)} ${tip.x-hs*Math.cos(angle+spread)},${tip.y-hs*Math.sin(angle+spread)}`);
  poly.setAttribute('fill',color); poly.setAttribute('stroke-linejoin','round'); poly.style.pointerEvents='none'; return poly;
}
function formatDistance(start,end){ return `${Math.round(dist(start,end))} м`; }
function makeSvgBadge(text,x,y,unit,color,cls){
  const g=NS('g'); if(cls) g.classList.add(cls);
  const font=12*unit, padX=6*unit, w=Math.max(38*unit,text.length*7.2*unit+padX*2), h=21*unit;
  g.setAttribute('transform',`translate(${x},${y})`); g.setAttribute('pointer-events','none');
  const bg=NS('rect'); bg.setAttribute('x',-w/2); bg.setAttribute('y',-h/2); bg.setAttribute('width',w); bg.setAttribute('height',h);
  bg.setAttribute('rx',4*unit); bg.setAttribute('fill','#10101d'); bg.setAttribute('fill-opacity','.9');
  bg.setAttribute('stroke',color||'#f0c040'); bg.setAttribute('stroke-width', Math.max(1, 1*unit)); bg.setAttribute('stroke-opacity','.55');
  const t=NS('text'); t.setAttribute('x',0); t.setAttribute('y',4.2*unit); t.setAttribute('fill','#f4d35e');
  t.setAttribute('font-size',font); t.setAttribute('font-family','Segoe UI, Arial, sans-serif'); t.setAttribute('font-weight','700'); t.setAttribute('text-anchor','middle'); t.textContent=text;
  g.appendChild(bg); g.appendChild(t); return g;
}
function buildMeasure(start,end,color){
  const g=NS('g'); g.dataset.label='';
  const line=NS('line'); line.setAttribute('x1',start.x); line.setAttribute('y1',start.y); line.setAttribute('x2',end.x); line.setAttribute('y2',end.y);
  setPathStyle(line,color,2,'7,5'); line.style.cursor='move'; g.appendChild(line);
  g.appendChild(makeArrowHeadAt(start,end,color)); g.appendChild(makeArrowHeadAt(end,start,color));
  const mid={x:(start.x+end.x)/2,y:(start.y+end.y)/2}; const unit=1/zoom;
  g.appendChild(makeSvgBadge(formatDistance(start,end),mid.x,mid.y-16*unit,unit,color,'measure-badge'));
  return g;
}
function buildTextNote(data,color){
  const g=NS('g'); g.dataset.label='';
  const scale=data.scale||1, unit=scale/zoom, text=(data.text||'Текст').trim()||'Текст';
  g.setAttribute('transform',`translate(${data.x},${data.y})`); g.style.cursor='move';
  const badge=makeSvgBadge(text,0,0,unit,color,'text-note-badge');
  g.appendChild(badge); return g;
}
function buildSymbol(sym,pos,color,scale){
  const g=NS('g'); g.dataset.label=''; scale=scale||1;
  g.setAttribute('transform',`translate(${pos.x},${pos.y}) scale(${scale/zoom})`);
  
  // Use DOMParser for safer HTML parsing instead of innerHTML
  const svgString = '<svg xmlns="http://www.w3.org/2000/svg">' + symSVG(sym, color) + '</svg>';
  const parser = new DOMParser();
  const doc = parser.parseFromString(svgString, 'image/svg+xml');
  const content = doc.querySelector('svg');
  if(content){
    while(content.firstChild) g.appendChild(content.firstChild);
  }
  g.style.cursor='move'; 
  return g;
}

function registerEl(g,id){ g.dataset.eid=String(id); g.addEventListener('mousedown',()=>{}); return g; }

function applyElementStyle(elData){
  const d=elData.data||{};
  if(d.opacity!==undefined) elData.el.style.opacity=d.opacity;
  if(d.strokeWidth!==undefined){
    elData.el.querySelectorAll('line,path,polygon').forEach(s=>{
      if(!s.closest('.perm-label,.measure-badge,.text-note-badge')) s.setAttribute('stroke-width',d.strokeWidth);
    });
  }
}

function rebuildEl(elData){
  const g=elData.el; while(g.firstChild) g.removeChild(g.firstChild);
  const {type,data}=elData, pts=data.points||[];
  let fresh;
  if     (type==='flex-arrow')      fresh=buildFlexArrow(pts,false,data.color);
  else if(type==='flex-arrow-dash') fresh=buildFlexArrow(pts,true,data.color);
  else if(type==='wide-arrow')      fresh=buildWideArrow(pts,data.color);
  else if(type==='line')            fresh=buildLine(data.start,data.end,data.color);
  else if(type==='area')            fresh=buildArea(pts,data.color);
  else if(type==='marker')          fresh=buildMarker(pts,data.color);
  else if(type==='boundary')        fresh=buildBoundary(pts,data.color);
  else if(type==='measure')         fresh=buildMeasure(data.start,data.end,data.color);
  else if(type==='text')            fresh=buildTextNote(data,data.color);
  else if(type==='mine')            fresh=buildMineField(pts,data.color);
  else if(type==='trench')          fresh=buildTrench(pts,data.color);
  else if(type==='point')           fresh=buildPoint(data,data.color);
  else return;
  while(fresh.firstChild) g.appendChild(fresh.firstChild);
  applyElementStyle(elData);
  updateLabel(elData);
}

// ─── PREVIEW HELPERS ─────────────────────────────────────────────────────
function clearPreview(){ previewGrp.innerHTML=''; if(symPreview) previewGrp.appendChild(symPreview); }

function smoothPathScreen(sp){
  if(sp.length<2) return '';
  if(sp.length===2) return `M${sp[0].x},${sp[0].y}L${sp[1].x},${sp[1].y}`;
  let d=`M${sp[0].x.toFixed(1)},${sp[0].y.toFixed(1)}`;
  for(let i=0;i<sp.length-1;i++){
    const p0=sp[Math.max(0,i-1)],p1=sp[i],p2=sp[i+1],p3=sp[Math.min(sp.length-1,i+2)];
    const cp1x=p1.x+(p2.x-p0.x)/6,cp1y=p1.y+(p2.y-p0.y)/6;
    const cp2x=p2.x-(p3.x-p1.x)/6,cp2y=p2.y-(p3.y-p1.y)/6;
    d+=`C${cp1x.toFixed(1)},${cp1y.toFixed(1)} ${cp2x.toFixed(1)},${cp2y.toFixed(1)} ${p2.x.toFixed(1)},${p2.y.toFixed(1)}`;
  }
  return d;
}

function previewFlexArrow(pts,dashed,color){
  clearPreview(); if(pts.length<2) return;
  const sp=pts.map(toScreen), g=NS('g'); g.setAttribute('opacity','0.65');
  const path=NS('path'); path.setAttribute('d',smoothPathScreen(sp));
  path.setAttribute('stroke',color); path.setAttribute('stroke-width','4');
  path.setAttribute('fill','none'); path.setAttribute('stroke-linecap','round');
  path.setAttribute('stroke-linejoin','round'); if(dashed) path.setAttribute('stroke-dasharray','10,7'); g.appendChild(path);
  if(pts.length>=2){ const last=sp[sp.length-1],prev=sp[sp.length-2];
    const angle=Math.atan2(last.y-prev.y,last.x-prev.x), hs=16, spread=.46;
    const tip=NS('polygon');
    tip.setAttribute('points',`${last.x},${last.y} ${last.x-hs*Math.cos(angle-spread)},${last.y-hs*Math.sin(angle-spread)} ${last.x-hs*Math.cos(angle+spread)},${last.y-hs*Math.sin(angle+spread)}`);
    tip.setAttribute('fill',color); tip.setAttribute('stroke-linejoin','round'); g.appendChild(tip); }
  previewGrp.appendChild(g);
}

function previewLine(start,end,color){
  clearPreview();
  const ss=toScreen(start),se=toScreen(end),line=NS('line');
  line.setAttribute('x1',ss.x); line.setAttribute('y1',ss.y);
  line.setAttribute('x2',se.x); line.setAttribute('y2',se.y);
  line.setAttribute('stroke',color); line.setAttribute('stroke-width','2.5'); line.setAttribute('opacity','0.7');
  previewGrp.appendChild(line);
}

function previewArea(pts,color){
  clearPreview(); if(pts.length<2) return;
  const sp=pts.map(toScreen), poly=NS('polygon');
  poly.setAttribute('points',sp.map(p=>`${p.x},${p.y}`).join(' '));
  poly.setAttribute('fill',color); poly.setAttribute('fill-opacity','.12');
  poly.setAttribute('stroke',color); poly.setAttribute('stroke-width','2');
  poly.setAttribute('stroke-dasharray','6,4'); poly.setAttribute('opacity','0.75');
  previewGrp.appendChild(poly);
}

function previewMarker(pts,color){
  clearPreview(); if(pts.length<2) return;
  const sp=pts.map(toScreen), path=NS('path');
  path.setAttribute('d',smoothPathScreen(sp)); path.setAttribute('stroke',color);
  path.setAttribute('stroke-width','18'); path.setAttribute('fill','none');
  path.setAttribute('stroke-linecap','round'); path.setAttribute('opacity','0.35');
  previewGrp.appendChild(path);
}

function previewFreehand(pts,kind,color){
  clearPreview(); if(pts.length<2) return;
  const sp=pts.map(toScreen), d=smoothPathScreen(sp);
  if(kind==='mine'){
    const bg=NS('path'); bg.setAttribute('d',d); bg.setAttribute('stroke',color); bg.setAttribute('stroke-width','12');
    bg.setAttribute('fill','none'); bg.setAttribute('stroke-dasharray','7,5'); bg.setAttribute('opacity','0.45'); previewGrp.appendChild(bg);
    const fg=NS('path'); fg.setAttribute('d',d); fg.setAttribute('stroke',color); fg.setAttribute('stroke-width','1.5');
    fg.setAttribute('fill','none'); fg.setAttribute('stroke-dasharray','3,4'); previewGrp.appendChild(fg);
  } else {
    const main=NS('path'); main.setAttribute('d',d); main.setAttribute('stroke',color); main.setAttribute('stroke-width','3');
    main.setAttribute('fill','none'); main.setAttribute('stroke-linecap','round'); main.setAttribute('opacity','0.8'); previewGrp.appendChild(main);
    const hs=10;
    for(let i=1;i<sp.length;i++){ const seg=dist(sp[i-1],sp[i]); if(seg<hs*1.5) continue;
      const angle=Math.atan2(sp[i].y-sp[i-1].y,sp[i].x-sp[i-1].x)-Math.PI/2;
      const mx=(sp[i-1].x+sp[i].x)/2, my=(sp[i-1].y+sp[i].y)/2;
      const tick=NS('line'); tick.setAttribute('x1',mx); tick.setAttribute('y1',my);
      tick.setAttribute('x2',mx+hs*Math.cos(angle)); tick.setAttribute('y2',my+hs*Math.sin(angle));
      tick.setAttribute('stroke',color); tick.setAttribute('stroke-width','1.5'); tick.setAttribute('opacity','0.65');
      previewGrp.appendChild(tick); }
  }
}

function previewBoundary(pts,color){
  clearPreview(); if(pts.length<2) return;
  const sp=pts.map(toScreen), d=smoothPathScreen(sp);
  const main=NS('path'); main.setAttribute('d',d); main.setAttribute('stroke',color);
  main.setAttribute('stroke-width','2.6'); main.setAttribute('stroke-dasharray','13,5');
  main.setAttribute('fill','none'); main.setAttribute('stroke-linecap','round'); previewGrp.appendChild(main);
  const step=18;
  for(let i=1;i<sp.length;i++){ const seg=dist(sp[i-1],sp[i]); if(seg<step) continue;
    const angle=Math.atan2(sp[i].y-sp[i-1].y,sp[i].x-sp[i-1].x)-Math.PI/2;
    for(let t=step;t<seg;t+=step){ const k=t/seg, mx=sp[i-1].x+(sp[i].x-sp[i-1].x)*k, my=sp[i-1].y+(sp[i].y-sp[i-1].y)*k;
      const tick=NS('line'); tick.setAttribute('x1',mx); tick.setAttribute('y1',my);
      tick.setAttribute('x2',mx+13*Math.cos(angle)); tick.setAttribute('y2',my+13*Math.sin(angle));
      tick.setAttribute('stroke',color); tick.setAttribute('stroke-width','2'); previewGrp.appendChild(tick); } }
}

function previewMeasure(start,end,color){
  clearPreview();
  const ss=toScreen(start), se=toScreen(end), line=NS('line');
  line.setAttribute('x1',ss.x); line.setAttribute('y1',ss.y); line.setAttribute('x2',se.x); line.setAttribute('y2',se.y);
  line.setAttribute('stroke',color); line.setAttribute('stroke-width','2'); line.setAttribute('stroke-dasharray','7,5'); previewGrp.appendChild(line);
  const mid={x:(ss.x+se.x)/2,y:(ss.y+se.y)/2};
  previewGrp.appendChild(makeSvgBadge(formatDistance(start,end),mid.x,mid.y-16,1,color,'measure-badge'));
}

// ─── SELECTION ───────────────────────────────────────────────────────────
function clearSelection(){ selectedIds.clear(); selGrp.innerHTML=''; propsPanel.classList.remove('visible'); }

function getElBBox(el){
  if(el.type==='symbol'){ const s=18*(el.data.scale||1)/zoom; return {x1:el.data.x-s,y1:el.data.y-s,x2:el.data.x+s,y2:el.data.y+s}; }
  if(el.type==='text'){
    const unit=(el.data.scale||1)/zoom, text=(el.data.text||'Текст').trim()||'Текст';
    const w=Math.max(38*unit,text.length*7.2*unit+12*unit), h=24*unit;
    return {x1:el.data.x-w/2,y1:el.data.y-h/2,x2:el.data.x+w/2,y2:el.data.y+h/2};
  }
  const pts=el.data.points||((el.type==='line'||el.type==='measure')?[el.data.start,el.data.end]:[]);
  if(!pts.length) return {x1:0,y1:0,x2:0,y2:0};
  return {x1:Math.min(...pts.map(p=>p.x)),y1:Math.min(...pts.map(p=>p.y)),x2:Math.max(...pts.map(p=>p.x)),y2:Math.max(...pts.map(p=>p.y))};
}

function drawSelBox(){
  selGrp.innerHTML=''; if(!selectedIds.size) return;
  let x1=Infinity,y1=Infinity,x2=-Infinity,y2=-Infinity;
  selectedIds.forEach(id=>{ const el=elements.find(e=>e.id===id); if(!el) return;
    const bb=getElBBox(el); x1=Math.min(x1,bb.x1); y1=Math.min(y1,bb.y1); x2=Math.max(x2,bb.x2); y2=Math.max(y2,bb.y2); });
  if(x1===Infinity) return;
  const pad=8/zoom, box=NS('rect');
  box.setAttribute('x',x1-pad); box.setAttribute('y',y1-pad);
  box.setAttribute('width',x2-x1+pad*2); box.setAttribute('height',y2-y1+pad*2);
  box.setAttribute('fill','rgba(240,192,64,.07)'); box.setAttribute('stroke','#f0c040');
  box.setAttribute('stroke-width', Math.max(1.5, 1.5)); box.setAttribute('stroke-dasharray',`${Math.max(5, 5)},${Math.max(3, 3)}`);
  box.setAttribute('pointer-events','none'); selGrp.appendChild(box);
  if(selectedIds.size===1){
    const el=elements.find(e=>e.id===Array.from(selectedIds)[0]);
    if(el){
      if(el.type==='symbol'){
        [[x1-pad,y1-pad],[x2+pad,y1-pad],[x1-pad,y2+pad],[x2+pad,y2+pad]].forEach(([cx,cy])=>{
          const r=NS('rect'),hs=5/zoom; r.setAttribute('x',cx-hs); r.setAttribute('y',cy-hs);
          r.setAttribute('width',hs*2); r.setAttribute('height',hs*2); r.setAttribute('class','resize-handle'); selGrp.appendChild(r);
        });
      }
      if(el.type==='area' && el.data.points){
        el.data.points.forEach((pt, idx) => {
          const sp = toScreen(pt);
          const v = NS('circle');
          v.setAttribute('cx', sp.x);
          v.setAttribute('cy', sp.y);
          v.setAttribute('r', Math.max(5, 5/zoom));
          v.setAttribute('fill', 'var(--accent)');
          v.setAttribute('stroke', '#17172a');
          v.setAttribute('stroke-width', '1.5');
          v.setAttribute('class', 'area-vertex');
          v.dataset.vertexIdx = idx;
          v.dataset.areaId = el.id;
          v.style.cursor = 'move';
          selGrp.appendChild(v);
        });
      }
    }
  }
  showProps();
}

function selectInRect(r){ elements.forEach(el=>{ const bb=getElBBox(el); if(bb.x2>=r.x1&&bb.x1<=r.x2&&bb.y2>=r.y1&&bb.y1<=r.y2) selectedIds.add(el.id); }); drawSelBox(); }

// ─── DRAG & RESIZE ───────────────────────────────────────────────────────
function applyDrag(ds,dx,dy){
  // Vertex drag for area polygon
  if (ds.vertexDragIdx !== undefined && ds.ids && ds.ids.length === 1) {
    const id = ds.ids[0];
    const el = elements.find(e => e.id === id);
    if (el && el.type === 'area' && el.data.points) {
      const orig = ds.origPositions.get(id);
      if (orig && orig.points && ds.vertexDragIdx < orig.points.length) {
        const origPt = orig.points[ds.vertexDragIdx];
        el.data.points[ds.vertexDragIdx] = { x: origPt.x + dx, y: origPt.y + dy };
        rebuildEl(el);
        drawSelBox();
        return;
      }
    }
  }

  if(ds.ids && ds.origPositions){
    ds.ids.forEach(id=>{
      const el=elements.find(e=>e.id===id);
      if(!el) return;
      const orig=ds.origPositions.get(id);
      if(!orig) return;
      const d=el.data;
      if(el.type==='point'){
        d.x=orig.x+dx; d.y=orig.y+dy;
        rebuildEl(el);
      } else if(el.type==='symbol'){
        d.x=(orig.x||0)+dx; d.y=(orig.y||0)+dy;
        el.el.setAttribute('transform',`translate(${d.x},${d.y}) scale(${(d.scale||1)/zoom})`);
      } else if(el.type==='text'){
        d.x=(orig.x||0)+dx; d.y=(orig.y||0)+dy;
        el.el.setAttribute('transform',`translate(${d.x},${d.y})`);
      } else if(el.type==='line'||el.type==='measure'){
        d.start={x:orig.start.x+dx,y:orig.start.y+dy};
        d.end={x:orig.end.x+dx,y:orig.end.y+dy};
        rebuildEl(el);
      } else if(orig.points){
        d.points=orig.points.map(p=>({x:p.x+dx,y:p.y+dy}));
        rebuildEl(el);
      }
      if(el.type==='wide-arrow') updateWideArrowMerges();
      updateLabel(el);
    });
  } else {
    const el=ds.elData;
    if(!el) return;
    const d=el.data;
    if(el.type==='point'){
      d.x=d.x+dx; d.y=d.y+dy;
      rebuildEl(el);
    } else if(el.type==='symbol'){
      d.x=(d.x||0)+dx; d.y=(d.y||0)+dy;
      el.el.setAttribute('transform',`translate(${d.x},${d.y}) scale(${(d.scale||1)/zoom})`);
    } else if(el.type==='text'){
      d.x=(d.x||0)+dx; d.y=(d.y||0)+dy;
      el.el.setAttribute('transform',`translate(${d.x},${d.y})`);
    } else if(el.type==='line'||el.type==='measure'){
      d.start={x:d.start.x+dx,y:d.start.y+dy};
      d.end={x:d.end.x+dx,y:d.end.y+dy};
      rebuildEl(el);
    } else if(d.points){
      d.points=d.points.map(p=>({x:p.x+dx,y:p.y+dy}));
      rebuildEl(el);
    }
    if(el.type==='wide-arrow') updateWideArrowMerges();
    updateLabel(el);
  }
  drawSelBox();
}

function applyResize(rs,dx,dy){
  const d=rs.elData.data; d.scale=clamp((d.scale||1)+(dx+dy)*0.005,0.2,4);
  if(rs.elData.type==='symbol') rs.elData.el.setAttribute('transform',`translate(${d.x},${d.y}) scale(${d.scale/zoom})`);
  document.getElementById('propScale').value=Math.round(d.scale*100);
  drawSelBox(); updateLabel(rs.elData);
}

function applyImageResize(rs,dx,dy){
  const im=rs.imgObj; let nw=rs.origW,nh=rs.origH,nx=rs.origCx,ny=rs.origCy;
  if(rs.corner==='se'){nw=rs.origW+dx*2;nh=rs.origH+dy*2;nx=rs.origCx+dx;ny=rs.origCy+dy;}
  else if(rs.corner==='sw'){nw=rs.origW-dx*2;nh=rs.origH+dy*2;nx=rs.origCx-dx;ny=rs.origCy+dy;}
  else if(rs.corner==='ne'){nw=rs.origW+dx*2;nh=rs.origH-dy*2;nx=rs.origCx+dx;ny=rs.origCy-dy;}
  else{nw=rs.origW-dx*2;nh=rs.origH-dy*2;nx=rs.origCx-dx;ny=rs.origCy-dy;}
  nw=Math.max(20,nw); nh=Math.max(20,nh);
  im.w=nw; im.h=nh; im.cx=nx; im.cy=ny;
  im.el.setAttribute('width',nw); im.el.setAttribute('height',nh);
  im.el.setAttribute('x',nx-nw/2); im.el.setAttribute('y',ny-nh/2);
  showImageBorder();
}

// ─── LABELS ──────────────────────────────────────────────────────────────
function updateLabel(elData){
  const old=elData.el.querySelector('.perm-label'); if(old) old.remove();
  const text=(elData.el.dataset.label||'').trim(); if(!text) return;
  const isSymbol=elData.type==='symbol';
  const scale=isSymbol?(elData.data.scale||1):zoom;
  const unit=1/Math.max(.01,scale);
  const font=12*unit, padX=6*unit, h=21*unit;
  const w=Math.max(34*unit,text.length*7.1*unit+padX*2);
  let anchor={x:0,y:0};
  if(isSymbol){
    anchor={x:0,y:-32*unit};
  } else {
    const bb=getElBBox(elData);
    anchor={x:(bb.x1+bb.x2)/2,y:bb.y1-18*unit};
  }
  const g=NS('g'); g.classList.add('perm-label');
  g.setAttribute('transform',`translate(${anchor.x},${anchor.y})`);
  g.setAttribute('pointer-events','none');
  const bg=NS('rect');
  bg.setAttribute('x',-w/2); bg.setAttribute('y',-h/2);
  bg.setAttribute('width',w); bg.setAttribute('height',h);
  bg.setAttribute('rx',4*unit); bg.setAttribute('fill','#10101d');
  bg.setAttribute('fill-opacity','.88'); bg.setAttribute('stroke','#f0c040');
  bg.setAttribute('stroke-width', Math.max(1.1, 1.1*unit)); bg.setAttribute('stroke-opacity','.45');
  const t=NS('text');
  t.setAttribute('x',0); t.setAttribute('y',4.2*unit);
  t.setAttribute('fill','#f4d35e'); t.setAttribute('font-size',font);
  t.setAttribute('font-family','Segoe UI, Arial, sans-serif');
  t.setAttribute('font-weight','700'); t.setAttribute('text-anchor','middle');
  t.textContent=text;
  g.appendChild(bg); g.appendChild(t); elData.el.appendChild(g);
}

// ─── HISTORY ─────────────────────────────────────────────────────────────
function saveHistory(){
  history.push({
    elements: elements.map(el=>({id:el.id,type:el.type,data:cloneData(el.data),label:el.el.dataset.label||''})),
    images: images.map(im=>({id:im.id,dataUrl:im.dataUrl,cx:im.cx,cy:im.cy,w:im.w,h:im.h,origW:im.origW,origH:im.origH})),
    nextId,
    imgNextId
  });
  if(history.length>60) history.shift();
  redoStack = []; // Clear redo stack on new action
  updateUndoRedoButtons();
  saveSheetHistory();
}

function saveSheetHistory(){
  const sheet = sheets.find(s => s.id === currentSheetId);
  if(!sheet) return;
  sheet.history = history.slice();
  sheet.redoStack = redoStack.slice();
}

function loadSheetHistory(){
  const sheet = sheets.find(s => s.id === currentSheetId);
  history = sheet && sheet.history ? sheet.history.slice() : [];
  redoStack = sheet && sheet.redoStack ? sheet.redoStack.slice() : [];
  updateUndoRedoButtons();
}

function updateUndoRedoButtons(){
  const undoBtn = document.getElementById('undoBtn');
  const redoBtn = document.getElementById('redoBtn');
  if(undoBtn) {
    undoBtn.style.opacity = history.length ? '1' : '0.5';
    undoBtn.style.pointerEvents = history.length ? 'auto' : 'none';
  }
  if(redoBtn) {
    redoBtn.style.opacity = redoStack.length ? '1' : '0.5';
    redoBtn.style.pointerEvents = redoStack.length ? 'auto' : 'none';
  }
}

function undoAction(){
  if(!history.length) return;
  const snap = history.pop(); 
  redoStack.push({
    elements: elements.map(el=>({id:el.id,type:el.type,data:cloneData(el.data),label:el.el.dataset.label||''})),
    images: images.map(im=>({id:im.id,dataUrl:im.dataUrl,cx:im.cx,cy:im.cy,w:im.w,h:im.h,origW:im.origW,origH:im.origH})),
    nextId,
    imgNextId
  });
  // Clear DOM properly
  while(elemGroup.firstChild) elemGroup.removeChild(elemGroup.firstChild);
  while(imgGrp.firstChild) imgGrp.removeChild(imgGrp.firstChild);
  elements = []; 
  images = [];
  // Clear wide arrow masks to prevent memory leaks
  clearWideArrowMasks();
  
  const snapElements = Array.isArray(snap) ? snap : (snap.elements || []);
  snapElements.forEach(s => { 
    const data = cloneData(s.data || {}), 
    el = spawnEl({...s, data}); 
    elements.push({id: s.id, type: s.type, data, el}); 
  });
  if(!Array.isArray(snap) && (snap.images || []).length){
    (snap.images || []).forEach(restoreImage);
  }
  nextId = (!Array.isArray(snap) && snap.nextId) || (elements.length ? Math.max(...elements.map(e => e.id)) + 1 : 1);
  imgNextId = (!Array.isArray(snap) && snap.imgNextId) || (images.length ? Math.max(...images.map(i => i.id)) + 1 : 1);
  clearSelection(); 
  deselectImages();
  lastDecorZoom = null;
  updateImageInteractivity(); 
  updateTransform();
  updateUndoRedoButtons();
  showToast('Действие отменено', 'success');
}

function redoAction(){
  if(!redoStack.length) return;
  const snap = redoStack.pop();
  history.push({
    elements: elements.map(el=>({id:el.id,type:el.type,data:cloneData(el.data),label:el.el.dataset.label||''})),
    images: images.map(im=>({id:im.id,dataUrl:im.dataUrl,cx:im.cx,cy:im.cy,w:im.w,h:im.h,origW:im.origW,origH:im.origH})),
    nextId,
    imgNextId
  });
  // Clear DOM properly
  while(elemGroup.firstChild) elemGroup.removeChild(elemGroup.firstChild);
  while(imgGrp.firstChild) imgGrp.removeChild(imgGrp.firstChild);
  elements = []; 
  images = [];
  // Clear wide arrow masks to prevent memory leaks
  clearWideArrowMasks();
  
  const snapElements = Array.isArray(snap) ? snap : (snap.elements || []);
  snapElements.forEach(s => { 
    const data = cloneData(s.data || {}), 
    el = spawnEl({...s, data}); 
    elements.push({id: s.id, type: s.type, data, el}); 
  });
  if(!Array.isArray(snap) && (snap.images || []).length){
    (snap.images || []).forEach(restoreImage);
  }
  nextId = (!Array.isArray(snap) && snap.nextId) || (elements.length ? Math.max(...elements.map(e => e.id)) + 1 : 1);
  imgNextId = (!Array.isArray(snap) && snap.imgNextId) || (images.length ? Math.max(...images.map(i => i.id)) + 1 : 1);
  clearSelection(); 
  deselectImages();
  lastDecorZoom = null;
  updateImageInteractivity(); 
  updateTransform();
  updateUndoRedoButtons();
  showToast('Действие возвращено', 'success');
}

function spawnEl(s){
  const {type,data,label}=s; let g;
  if     (type==='flex-arrow')      g=buildFlexArrow(data.points,false,data.color);
  else if(type==='flex-arrow-dash') g=buildFlexArrow(data.points,true,data.color);
  else if(type==='wide-arrow')      g=buildWideArrow(data.points,data.color);
  else if(type==='line')            g=buildLine(data.start,data.end,data.color);
  else if(type==='area')            g=buildArea(data.points,data.color);
  else if(type==='marker')          g=buildMarker(data.points,data.color);
  else if(type==='boundary')        g=buildBoundary(data.points,data.color);
  else if(type==='measure')         g=buildMeasure(data.start,data.end,data.color);
  else if(type==='text')            g=buildTextNote(data,data.color);
  else if(type==='mine')            g=buildMineField(data.points,data.color);
  else if(type==='point')           g=buildPoint(data,data.color);
  else if(type==='symbol')          g=buildSymbol(data.symbol,{x:data.x,y:data.y},data.color,data.scale);
  else g=NS('g');
  registerEl(g,s.id); g.dataset.label=label||''; elemGroup.appendChild(g);
  applyElementStyle({id:s.id,type,data,el:g});
  updateLabel({id:s.id,type,data,el:g});
  return g;
}

// ─── PROPS PANEL ─────────────────────────────────────────────────────────
function showProps(){
  if(!selectedIds.size&&!selectedImgId){ propsPanel.classList.remove('visible'); return; }
  propsPanel.classList.add('visible'); document.getElementById('scaleRow').style.display='none';
  if(selectedImgId){ document.getElementById('propsTitle').textContent='Изображение'; document.getElementById('propLabel').value=''; return; }
  if(selectedIds.size>1){ document.getElementById('propsTitle').textContent=`Выбрано: ${selectedIds.size}`; document.getElementById('propLabel').value=''; return; }
  const elData=elements.find(e=>e.id===Array.from(selectedIds)[0]); if(!elData) return;
  const names={'symbol':'Символ: '+(elData.data.symbol||''),'flex-arrow':'Гибкая стрелка','flex-arrow-dash':'Штриховая стрелка','wide-arrow':'Широкая стрелка','line':'Линия','area':'Зона','boundary':'Рубеж','measure':'Линейка','text':'Текстовая метка','marker':'Маркер','mine':'Минное поле','trench':'Траншея'};
  document.getElementById('propsTitle').textContent=names[elData.type]||'Элемент';
  document.getElementById('propLabel').value=elData.type==='text'?(elData.data.text||''):(elData.el.dataset.label||'');
  document.getElementById('propStroke').value=elData.data.strokeWidth||2;
  document.getElementById('propOpacity').value=elData.data.opacity||1;
  if(elData.type==='symbol'||elData.type==='text'){ document.getElementById('scaleRow').style.display='flex'; document.getElementById('propScale').value=Math.round((elData.data.scale||1)*100); }
}

document.getElementById('propStroke').addEventListener('input',function(){
  const val=Number(this.value);
  selectedIds.forEach(id=>{ const el=elements.find(e=>e.id===id); if(!el) return; el.data.strokeWidth=val; applyElementStyle(el); });
});
document.getElementById('propOpacity').addEventListener('input',function(){
  const val=this.value;
  selectedIds.forEach(id=>{ const el=elements.find(e=>e.id===id); if(!el) return; el.data.opacity=Number(val); applyElementStyle(el); });
});
document.getElementById('propScale').addEventListener('input',function(){
  if(selectedIds.size!==1) return;
  const el=elements.find(e=>e.id===Array.from(selectedIds)[0]); if(!el||(el.type!=='symbol'&&el.type!=='text')) return;
  el.data.scale=this.value/100;
  if(el.type==='symbol') el.el.setAttribute('transform',`translate(${el.data.x},${el.data.y}) scale(${el.data.scale/zoom})`);
  else rebuildEl(el);
  drawSelBox(); updateLabel(el);
});
document.getElementById('propLabel').addEventListener('input',function(){
  if(selectedIds.size!==1) return;
  const el=elements.find(e=>e.id===Array.from(selectedIds)[0]); if(!el) return;
  if(el.type==='text'){ el.data.text=this.value; rebuildEl(el); drawSelBox(); }
  else { el.el.dataset.label=this.value; updateLabel(el); }
});

// ─── TOOL MANAGEMENT ─────────────────────────────────────────────────────
function setForceSide(side){
  activeForce=side==='enemy'?'enemy':'friendly';
  document.getElementById('forceFriendlyBtn').classList.toggle('active',activeForce==='friendly');
  document.getElementById('forceEnemyBtn').classList.toggle('active',activeForce==='enemy');
  document.documentElement.style.setProperty('--friendly',document.getElementById('colorFriendly').value);
  document.documentElement.style.setProperty('--enemy',document.getElementById('colorEnemy').value);
  if(currentTool==='symbol'&&currentSymbol){ createSymPreview(); refreshSymPreviewPos(); }
  updateStatus();
}

function setTool(tool,symBtn){
  currentTool=tool; currentSymbol=symBtn?symBtn.dataset.symbol:null;
  document.querySelectorAll('.tool-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.sym-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('#topSelectBtn,#topPanBtn').forEach(b=>b.classList.remove('active'));
  const tb=document.querySelector(`[data-tool="${tool}"]`); if(tb) tb.classList.add('active');
  if(symBtn) symBtn.classList.add('active');
  if(tool==='select') document.getElementById('topSelectBtn').classList.add('active');
  if(tool==='pan')    document.getElementById('topPanBtn').classList.add('active');
  canvasArea.className='canvas-area';
  if(tool==='pan') canvasArea.classList.add('tool-pan');
  const drawTools=['flex-arrow','flex-arrow-dash','wide-arrow','line','area','boundary','measure','marker','mine','trench','symbol','text'];
  if(drawTools.includes(tool)) canvasArea.classList.add('tool-draw');
  clearPreview();
  if(tool==='symbol'&&currentSymbol) createSymPreview(); else removeSymPreview();
  if(tool!=='select'){ clearSelection(); deselectImages(); }
  updateImageInteractivity();
  updateStatus();
  isDrawing=false; drawPts=[];
  // Hide label menu and finalize/cancel area building on tool switch
  hideLabelMenu();
  if (areaBuildingPts) {
    if (areaBuildingPts.length >= 3) finalizeArea(areaBuildingPts);
    else cancelAreaBuilding();
  }
}

svg.addEventListener('mousemove',e=>{ lastWorldMouse=getSvgPt(e); coordDisplay.textContent=`${Math.round(lastWorldMouse.x)}, ${Math.round(lastWorldMouse.y)}`; });
svg.addEventListener('mousedown', onMouseDown);
svg.addEventListener('mousemove', onMouseMove);
window.addEventListener('mouseup', onMouseUp);
svg.addEventListener('dblclick', onDblClick);
canvasArea.addEventListener('wheel', onWheel, {passive:false});
document.addEventListener('keydown', onKeyDown);
svg.addEventListener('contextmenu', e=>{ e.preventDefault(); onContextMenu(e); });

function onContextMenu(e){
  e.preventDefault();

  // Finalize area building on right-click
  if (areaBuildingPts && areaBuildingPts.length > 0) {
    finalizeArea(areaBuildingPts);
    return;
  }

  const p=getSvgPt(e);
  const target=e.target.closest('[data-eid]');
  if(target){
    const id=parseInt(target.dataset.eid);
    if((e.ctrlKey||e.metaKey)&&selectedIds.has(id)){
      selectedIds.delete(id);
      drawSelBox();
      return;
    }
    if(!selectedIds.has(id)){
      if(!e.ctrlKey&&!e.metaKey) selectedIds.clear();
      selectedIds.add(id);
      deselectImages(); drawSelBox();
    }
    if(currentTool!=='select'){
      setTool('select');
    }
  }
}

// ─── AREA POLYGON TOOL ──────────────────────────────────────────────────
let areaBuildingPts = null; // null = not building, array = vertices placed so far

function finalizeArea(pts) {
  if (!pts || pts.length < 3) {
    areaBuildingPts = null;
    clearPreview();
    return;
  }
  if (!isDrawing) return;
  isDrawing = false;
  const color = getColor();
  const id = nextId++;
  saveHistory();
  const g = buildArea(pts, color);
  const data = { points: pts.map(p => ({ x: p.x, y: p.y })), color };
  registerEl(g, id);
  elemGroup.appendChild(g);
  elements.push({ id, type: 'area', data, el: g });
  if (!isRemoteUpdate && connections.size > 0) {
    broadcastNewElement(elements[elements.length - 1]);
  }
  areaBuildingPts = null;
  drawPts = [];
  clearPreview();
  updateStatus();
  showToast('Зона создана', 'success');
}

function cancelAreaBuilding() {
  if (areaBuildingPts) {
    areaBuildingPts = null;
    isDrawing = false;
    drawPts = [];
    clearPreview();
  }
}

function previewAreaBuilding(pts, mousePt) {
  clearPreview();
  if (symPreview) previewGrp.appendChild(symPreview);
  if (!pts || pts.length === 0) return;
  const color = getColor();
  const allPts = mousePt ? [...pts, mousePt] : pts;
  const sp = allPts.map(toScreen);
  const poly = NS('polygon');
  poly.setAttribute('points', sp.map(p => `${p.x},${p.y}`).join(' '));
  poly.setAttribute('fill', color);
  poly.setAttribute('fill-opacity', '.12');
  poly.setAttribute('stroke', color);
  poly.setAttribute('stroke-width', '2');
  poly.setAttribute('stroke-dasharray', allPts.length > pts.length ? '6,4' : 'none');
  poly.setAttribute('opacity', '0.75');
  poly.style.pointerEvents = 'none';
  previewGrp.appendChild(poly);
  // Draw vertex dots
  pts.forEach(pt => {
    const sp2 = toScreen(pt);
    const dot = NS('circle');
    dot.setAttribute('cx', sp2.x);
    dot.setAttribute('cy', sp2.y);
    dot.setAttribute('r', '4');
    dot.setAttribute('fill', color);
    dot.setAttribute('opacity', '0.9');
    dot.style.pointerEvents = 'none';
    previewGrp.appendChild(dot);
  });
}

function addVertexToArea(elData, pt) {
  if (elData.type !== 'area' || !elData.data.points) return;
  saveHistory();
  const pts = elData.data.points;
  // Find closest edge and insert
  let minDist = Infinity;
  let insertIdx = pts.length;
  for (let i = 0; i < pts.length; i++) {
    const j = (i + 1) % pts.length;
    const d = ptLineDist(pt, pts[i], pts[j]);
    if (d < minDist) { minDist = d; insertIdx = j; }
  }
  pts.splice(insertIdx, 0, { x: pt.x, y: pt.y });
  rebuildEl(elData);
  drawSelBox();
  updateStatus();
}

function onMouseDown(e){
  if(e.button===1||currentTool==='pan'){
    isPanning=true; panStartX=e.clientX-panX; panStartY=e.clientY-panY;
    canvasArea.classList.add('panning'); e.preventDefault(); return;
  }
  if(e.button!==0) return;
  const p=getSvgPt(e);

  // Resize handle?
  const rh=e.target.closest('.resize-handle');
  if(rh&&currentTool==='select'){
    const imgId=rh.dataset.imgId;
    if(imgId){
      const im=images.find(i=>i.id===parseInt(imgId)); if(im){ saveHistory(); deselectImages(); selectImage(im.id); resizeState={imgObj:im,corner:rh.dataset.corner,origW:im.w,origH:im.h,origCx:im.cx,origCy:im.cy,startX:p.x,startY:p.y}; }
    } else {
      const id=Array.from(selectedIds)[0]; const elData=elements.find(el=>el.id===id);
      if(elData&&elData.type==='symbol'){ saveHistory(); resizeState={id,elData,orig:JSON.parse(JSON.stringify(elData.data)),startX:p.x,startY:p.y}; }
    }
    e.stopPropagation(); return;
  }

  // Image drag?
  if(currentTool==='select'&&selectedImgId){
    const im=images.find(i=>i.id===selectedImgId);
    if(im&&e.target===im.el){ imgDrag={obj:im,ox:im.cx,oy:im.cy,sx:p.x,sy:p.y}; return; }
  }

  if(currentTool==='select'){
    // Check for area vertex dragging first
    const vertexTarget = e.target.closest('.area-vertex');
    if (vertexTarget) {
      const areaId = parseInt(vertexTarget.dataset.areaId);
      const vertexIdx = parseInt(vertexTarget.dataset.vertexIdx);
      const areaEl = elements.find(el => el.id === areaId);
      if (areaEl && areaEl.type === 'area' && areaEl.data.points) {
        saveHistory();
        dragState = {
          ids: [areaId],
          startX: p.x,
          startY: p.y,
          origPositions: new Map([[areaId, JSON.parse(JSON.stringify(areaEl.data))]]),
          vertexDragIdx: vertexIdx
        };
        e.stopPropagation();
        return;
      }
    }

    const target=e.target.closest('[data-eid]');
    if(target){
      const id=parseInt(target.dataset.eid);
      if(!e.ctrlKey&&!e.metaKey&&!selectedIds.has(id)) selectedIds.clear();
      if(e.ctrlKey||e.metaKey){ if(selectedIds.has(id)) selectedIds.delete(id); else selectedIds.add(id); }
      else selectedIds.add(id);
      deselectImages(); drawSelBox();
      if(selectedIds.size>0){
        saveHistory();
        dragState={
          ids:Array.from(selectedIds),
          startX:p.x,
          startY:p.y,
          origPositions:new Map(selectedIds.map(sid=>{
            const el=elements.find(e=>e.id===sid);
            return [sid, el?JSON.parse(JSON.stringify(el.data)):null];
          }))
        };
      }
      return;
    }
    // Area vertex editing: if a single area is selected, add vertex on empty click
    if (!e.ctrlKey && !e.metaKey && selectedIds.size === 1) {
      const singleId = Array.from(selectedIds)[0];
      const areaEl = elements.find(el => el.id === singleId && el.type === 'area');
      if (areaEl) {
        addVertexToArea(areaEl, p);
        return;
      }
    }
    if(!e.ctrlKey&&!e.metaKey){ clearSelection(); deselectImages(); }
    rubberState={sx:p.x,sy:p.y}; return;
  }

  if(currentTool==='text'){
    const text=prompt('Текстовая метка:','');
    if(text===null||!text.trim()) return;
    saveHistory(); const id=nextId++, color=getColor();
    const data={x:p.x,y:p.y,text:text.trim(),color,scale:1};
    const g=buildTextNote(data,color); registerEl(g,id); elemGroup.appendChild(g);
    elements.push({id,type:'text',data,el:g}); updateStatus();
    // Broadcast to peers
    if(!isRemoteUpdate && connections.size > 0){
      broadcastNewElement(elements[elements.length-1]);
    }
    return;
  }

  if(currentTool==='symbol'&&currentSymbol){
    saveHistory(); const id=nextId++; const color=getColor();
    const g=buildSymbol(currentSymbol,p,color,1); registerEl(g,id); elemGroup.appendChild(g);
    elements.push({id,type:'symbol',data:{symbol:currentSymbol,x:p.x,y:p.y,color,scale:1},el:g}); updateStatus();
    // Broadcast to peers
    if(!isRemoteUpdate && connections.size > 0){
      broadcastNewElement(elements[elements.length-1]);
    }
    return;
  }

  if(currentTool==='point'){
    saveHistory(); const id=nextId++, color=getColor();
    const data={x:p.x,y:p.y,color};
    const g=buildPoint(p,color); registerEl(g,id); elemGroup.appendChild(g);
    elements.push({id,type:'point',data,el:g}); updateStatus();
    if(!isRemoteUpdate && connections.size > 0){
      broadcastNewElement(elements[elements.length-1]);
    }
    return;
  }

  if (currentTool === 'area') {
    if (!areaBuildingPts) {
      // Cancel any other drawing
      cancelAreaBuilding();
      // Start new area
      areaBuildingPts = [p];
      isDrawing = true;
      drawPts = [p];
    } else {
      // Add vertex
      areaBuildingPts.push(p);
      drawPts.push(p);
    }
    previewAreaBuilding(areaBuildingPts, null);
    return;
  }

  const drawTools=['flex-arrow','flex-arrow-dash','wide-arrow','line','boundary','measure','marker','mine','trench'];
  if(drawTools.includes(currentTool)){ isDrawing=true; drawPts=[p]; lastAddedPt=p; clearPreview(); }
}

function onMouseMove(e){
  if(isPanning){ panX=e.clientX-panStartX; panY=e.clientY-panStartY; updateTransform(); return; }

  if(imgDrag){
    const p=getSvgPt(e); imgDrag.obj.cx=imgDrag.ox+(p.x-imgDrag.sx); imgDrag.obj.cy=imgDrag.oy+(p.y-imgDrag.sy);
    imgDrag.obj.el.setAttribute('x',imgDrag.obj.cx-imgDrag.obj.w/2); imgDrag.obj.el.setAttribute('y',imgDrag.obj.cy-imgDrag.obj.h/2);
    showImageBorder(); return;
  }
  if(resizeState){
    const p=getSvgPt(e);
    if(resizeState.imgObj) applyImageResize(resizeState,p.x-resizeState.startX,p.y-resizeState.startY);
    else applyResize(resizeState,p.x-resizeState.startX,p.y-resizeState.startY);
    return;
  }
  if(dragState){ const p=getSvgPt(e); applyDrag(dragState,p.x-dragState.startX,p.y-dragState.startY); return; }

  if (currentTool === 'area' && areaBuildingPts && areaBuildingPts.length > 0) {
    const mp = getSvgPt(e);
    previewAreaBuilding(areaBuildingPts, mp);
    return;
  }

  if(currentTool==='symbol'&&currentSymbol){ refreshSymPreviewPos(getSvgPt(e)); return; }

  if(!isDrawing){
    if(rubberState){ const p=getSvgPt(e); drawRubberBand(rubberState.sx,rubberState.sy,p.x,p.y); }
    return;
  }

  const p=getSvgPt(e);
  const minPx=3/zoom;
  if(lastAddedPt&&dist(p,lastAddedPt)<minPx) return;
  drawPts.push(p); lastAddedPt=p;
  const color=getColor();

  if(currentTool==='flex-arrow')           previewFlexArrow(drawPts,false,color);
  else if(currentTool==='flex-arrow-dash') previewFlexArrow(drawPts,true,color);
  else if(currentTool==='wide-arrow')      previewWideArrow(drawPts,color);
  else if(currentTool==='line'&&drawPts.length>=2) previewLine(drawPts[0],p,color);
  else if(currentTool==='boundary')        previewBoundary(drawPts,color);
  else if(currentTool==='measure'&&drawPts.length>=2) previewMeasure(drawPts[0],p,color);
  else if(currentTool==='marker')          previewMarker(drawPts,color);
  else if(currentTool==='mine'||currentTool==='trench') previewFreehand(drawPts,currentTool,color);
}

function onMouseUp(e){
  if(isPanning){ isPanning=false; canvasArea.classList.remove('panning'); return; }
  if(imgDrag){ imgDrag=null; return; }
  if(resizeState){ resizeState=null; return; }
  if(dragState){
    // Clear vertex drag flag on mouseup (keep normal drag cleanup)
    if (dragState.vertexDragIdx !== undefined) { dragState=null; return; }
    dragState=null; return;
  }

  if(rubberState){
    const p=getSvgPt(e);
    const r={x1:Math.min(rubberState.sx,p.x),y1:Math.min(rubberState.sy,p.y),x2:Math.max(rubberState.sx,p.x),y2:Math.max(rubberState.sy,p.y)};
    if(r.x2-r.x1>5/zoom||r.y2-r.y1>5/zoom) selectInRect(r);
    rubberState=null; clearPreview(); return;
  }

  // Если меню меток открыто, не обрабатываем mouseup для рисования
  if(labelMenu && labelMenu.style.display === 'block') return;

  // Area is finalized via dblclick/Enter, not mouseup
  if (currentTool === 'area' && areaBuildingPts) return;

  if(!isDrawing) return;
  isDrawing=false; clearPreview();
  if(drawPts.length<2) return;

  const color=getColor(), tool=currentTool, id=nextId++;
  let g=null, data=null;
  const simplified=simplify(drawPts,1.0/zoom);

  if(tool==='flex-arrow'||tool==='flex-arrow-dash'){
    if(simplified.length<2) return; saveHistory();
    g=buildFlexArrow(simplified,tool==='flex-arrow-dash',color); data={points:simplified,color};
  } else if(tool==='wide-arrow'){
    if(simplified.length<2) return; saveHistory();
    g=buildWideArrow(simplified,color); data={points:simplified,color};
  } else if(tool==='line'){
    const start=drawPts[0],end=drawPts[drawPts.length-1];
    if(dist(start,end)<5/zoom) return; saveHistory();
    g=buildLine(start,end,color); data={start,end,color};
  } else if(tool==='measure'){
    const start=drawPts[0],end=drawPts[drawPts.length-1];
    if(dist(start,end)<5/zoom) return; saveHistory();
    g=buildMeasure(start,end,color); data={start,end,color};
  } else if(tool==='boundary'){
    if(simplified.length<2) return; saveHistory();
    g=buildBoundary(simplified,color); data={points:simplified,color};
  } else if(tool==='marker'){
    if(drawPts.length<2) return; saveHistory();
    g=buildMarker(drawPts,color); data={points:drawPts.map(p=>({x:p.x,y:p.y})),color};
  } else if(tool==='mine'){
    if(simplified.length<2) return; saveHistory();
    g=buildMineField(simplified,color); data={points:simplified,color};
  } else if(tool==='trench'){
    if(simplified.length<2) return; saveHistory();
    g=buildTrench(simplified,color); data={points:simplified,color};
  }

  if(g&&data){
    registerEl(g,id); elemGroup.appendChild(g); elements.push({id,type:tool,data,el:g});
    addLog(`Создан элемент: ID=${id}, тип=${tool}, цвет=${color}`, 'success');
    // Broadcast to peers (if not remote update)
    if(!isRemoteUpdate && connections.size > 0){
      broadcastNewElement(elements[elements.length-1]);
    }
    if(tool==='wide-arrow') updateWideArrowMerges();
    updateStatus();
  }
  drawPts=[];
}

}

function createLabelMenu() {
  if (labelMenu) return;
  labelMenu = document.createElement('div');
  labelMenu.id = 'labelMenu';
  labelMenu.style.cssText = `
    position:absolute;display:none;z-index:1000;
    background:rgba(23,23,42,.98);border:1px solid var(--border);
    border-radius:8px;padding:8px;box-shadow:var(--shadow);
    min-width:280px;backdrop-filter:blur(8px);
  `;
  
  const title = document.createElement('div');
  title.textContent = 'Выберите символ';
  title.style.cssText = 'font-size:11px;color:var(--accent);margin-bottom:6px;font-weight:600;';
  labelMenu.appendChild(title);
  
  // Создаем сетку для иконок символов
  const grid = document.createElement('div');
  grid.style.cssText = 'display:grid;grid-template-columns:repeat(4,1fr);gap:4px;max-height:320px;overflow-y:auto;padding:2px;';
  
  // Добавляем все символы в сетку
  Object.keys(symbolDefinitions).forEach(symKey => {
    const btn = document.createElement('button');
    btn.className = 'sym-btn';
    btn.style.cssText = 'padding:4px;border-radius:4px;cursor:pointer;background:rgba(255,255,255,.05);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;transition:.12s;';
    btn.onmouseover = () => btn.style.background = 'var(--accent-dim)';
    btn.onmouseout = () => btn.style.background = 'rgba(255,255,255,.05)';
    btn.innerHTML = symbolDefinitions[symKey];
    btn.onclick = () => placeSymbolAtCursor(symKey);
    grid.appendChild(btn);
  });
  
  labelMenu.appendChild(grid);
  
  const cancelRow = document.createElement('div');
  cancelRow.style.cssText = 'display:flex;justify-content:flex-end;margin-top:6px;';
  
  const cancelBtn = document.createElement('button');
  cancelBtn.textContent = 'Отмена';
  cancelBtn.style.cssText = `
    background:rgba(255,255,255,.07);border:1px solid var(--border);
    color:var(--text);padding:5px 12px;border-radius:4px;
    font-size:11px;cursor:pointer;
  `;
  cancelBtn.onclick = hideLabelMenu;
  cancelRow.appendChild(cancelBtn);
  
  labelMenu.appendChild(cancelRow);
  
  document.body.appendChild(labelMenu);
}

function showLabelMenu(x, y) {
  createLabelMenu();
  labelMenu.style.left = x + 'px';
  labelMenu.style.top = y + 'px';
  labelMenu.style.display = 'block';
  labelMenu.dataset.screenX = x;
  labelMenu.dataset.screenY = y;
}

function hideLabelMenu() {
  if (labelMenu) labelMenu.style.display = 'none';
}

function placeSymbolAtCursor(symbolType) {
  if (!labelMenu || labelMenu.style.display === 'none') return;
  
  const screenX = parseFloat(labelMenu.dataset.screenX);
  const screenY = parseFloat(labelMenu.dataset.screenY);
  if (!isFinite(screenX) || !isFinite(screenY)) {
    hideLabelMenu();
    return;
  }
  
  // Преобразуем экранные координаты в мировые
  const rect = canvasArea.getBoundingClientRect();
  const worldX = (screenX - rect.left - panX) / zoom;
  const worldY = (screenY - rect.top - panY) / zoom;
  
  saveHistory();
  const id = nextId++;
  const color = getColor();
  const data = { symbol: symbolType, x: worldX, y: worldY, color, scale: 1 };
  const g = buildSymbol(symbolType, { x: worldX, y: worldY }, color, 1);
  registerEl(g, id);
  elemGroup.appendChild(g);
  elements.push({ id, type: 'symbol', data, el: g });
  
  hideLabelMenu();
  updateStatus();
  showToast(`Символ добавлен`, 'success');
}

function onDblClick(e){
  // Finalize area building on double-click
  if (areaBuildingPts && areaBuildingPts.length > 0) {
    finalizeArea(areaBuildingPts);
    e.stopPropagation();
    return;
  }

  const p = getSvgPt(e);
  
  const target = e.target.closest('[data-eid]');
  if (target && currentTool === 'select') {
    const id = parseInt(target.dataset.eid);
    const elData = elements.find(el => el.id === id);
    if (!elData) return;
    const label = prompt('Подпись:', elData.el.dataset.label || '');
    if (label !== null) {
      elData.el.dataset.label = label;
      updateLabel(elData);
    }
    return;
  }
  
  createLabelMenu();
  labelMenu.dataset.screenX = e.clientX;
  labelMenu.dataset.screenY = e.clientY;
  showLabelMenu(e.clientX, e.clientY);
}

  e.stopPropagation();
});

function onWheel(e){
  e.preventDefault();
  const f=e.deltaY<0?1.14:1/1.14, r=canvasArea.getBoundingClientRect();
  panX=(e.clientX-r.left)-(e.clientX-r.left-panX)*f; panY=(e.clientY-r.top)-(e.clientY-r.top-panY)*f;
  zoom=clamp(zoom*f,0.04,23); updateTransform();
  if(currentTool==='symbol') refreshSymPreviewPos();
}

function onKeyDown(e){
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA') return;
  if(labelMenu && labelMenu.style.display === 'block'){
    if(e.key === 'Escape'){ e.preventDefault(); hideLabelMenu(); return; }
    return;
  }
  // Finalize area on Enter
  if (e.key === 'Enter' && areaBuildingPts && areaBuildingPts.length > 0) {
    e.preventDefault();
    finalizeArea(areaBuildingPts);
    return;
  }
  // Cancel area building on Escape
  if (e.key === 'Escape' && areaBuildingPts) {
    e.preventDefault();
    cancelAreaBuilding();
    showToast('Построение зоны отменено', 'warning');
    return;
  }
  if((e.key==='Delete'||e.key==='Backspace')&&!e.ctrlKey){ e.preventDefault(); deleteSelected(); return; }
  if(e.ctrlKey&&e.key==='z'){ e.preventDefault(); undoAction(); return; }
  if(e.ctrlKey&&e.key==='y'){ e.preventDefault(); redoAction(); return; }
  if(e.ctrlKey&&e.key==='a'){ e.preventDefault(); elements.forEach(el=>selectedIds.add(el.id)); drawSelBox(); return; }
  if(e.ctrlKey&&e.key==='d'){ e.preventDefault(); duplicateSelected(); return; }
  if(e.key==='Escape'){ 
    hideLabelMenu();
    setTool('select'); 
    return; 
  }
  if(['ArrowLeft','ArrowRight','ArrowUp','ArrowDown'].includes(e.key)&&selectedIds.size){
    e.preventDefault();
    const step=(e.shiftKey?20:5)/zoom;
    const dx=e.key==='ArrowLeft'?-step:e.key==='ArrowRight'?step:0;
    const dy=e.key==='ArrowUp'?-step:e.key==='ArrowDown'?step:0;
    saveHistory();
    selectedIds.forEach(id=>{ const el=elements.find(e2=>e2.id===id); if(!el) return;
      const ds={id,elData:el,orig:JSON.parse(JSON.stringify(el.data)),startX:0,startY:0}; applyDrag(ds,dx,dy); });
  }
}

function offsetElementData(type,data,dx,dy){
  if(type==='symbol'||type==='text'){ data.x+=dx; data.y+=dy; }
  else if(type==='line'||type==='measure'){
    data.start={x:data.start.x+dx,y:data.start.y+dy};
    data.end={x:data.end.x+dx,y:data.end.y+dy};
  } else if(data.points){
    data.points=data.points.map(p=>({x:p.x+dx,y:p.y+dy}));
  }
}

function duplicateSelected(){
  if(!selectedIds.size) return;
  saveHistory();
  const dx=24/zoom, dy=24/zoom, newIds=[];
  Array.from(selectedIds).forEach(id=>{
    const src=elements.find(e=>e.id===id); if(!src) return;
    const data=cloneData(src.data); offsetElementData(src.type,data,dx,dy);
    const newId=nextId++, g=spawnEl({id:newId,type:src.type,data,label:src.el.dataset.label||''});
    elements.push({id:newId,type:src.type,data,el:g}); newIds.push(newId);
  });
  selectedIds.clear(); newIds.forEach(id=>selectedIds.add(id));
  updateWideArrowMerges(); drawSelBox(); updateStatus();
  showToast(`Дублировано: ${newIds.length}`,'success');
}

function deleteSelected(){
  const hadElements = selectedIds.size > 0;
  const deletedIds = [];
  
  if(hadElements){ 
    saveHistory();
    elements = elements.filter(el => { 
      if(selectedIds.has(el.id)){
        addLog(`Удален элемент: ID=${el.id}, тип=${el.type}`, 'warning');
        el.el.remove();
        deletedIds.push(el.id);
        return false;
      } 
      return true; 
    });
    clearSelection(); 
  }
  if(selectedImgId){ 
    const idx = images.findIndex(im => im.id === selectedImgId);
    if(!hadElements) saveHistory();
    if(idx >= 0){
      images[idx].el.remove();
      images.splice(idx, 1);
    }
    deselectImages(); 
  }
  // Clear wide arrow masks to prevent memory leaks
  clearWideArrowMasks();
  updateWideArrowMerges();
  updateStatus();
  
  // Broadcast deletions to peers
  if(!isRemoteUpdate && connections.size > 0 && deletedIds.length > 0){
    deletedIds.forEach(id => broadcastDeleteElement(id));
  }
}

function clearAll(){
  if(!confirm('Удалить всё?')) return;
  saveHistory(); 
  // Clear DOM properly
  while(elemGroup.firstChild) elemGroup.removeChild(elemGroup.firstChild);
  elements = [];
  images.forEach(im => im.el.remove()); 
  images = [];
  // Clear wide arrow masks to prevent memory leaks
  clearWideArrowMasks();
  clearSelection(); 
  deselectImages();
  updateWideArrowMerges();
  updateStatus(); 
  showToast('Холст очищен', 'success');
}

function mergeBounds(a,b){
  if(!b) return a;
  if(!a) return {x:b.x,y:b.y,width:b.width,height:b.height};
  const x1=Math.min(a.x,b.x), y1=Math.min(a.y,b.y);
  const x2=Math.max(a.x+a.width,b.x+b.width), y2=Math.max(a.y+a.height,b.y+b.height);
  return {x:x1,y:y1,width:x2-x1,height:y2-y1};
}

function visibleWorldBounds(){
  const r=canvasArea.getBoundingClientRect();
  return {x:-panX/zoom,y:-panY/zoom,width:r.width/zoom,height:r.height/zoom};
}

function contentBounds(){
  let box=null;
  try{
    if(elemGroup.children.length){
      const b=elemGroup.getBBox();
      if(isFinite(b.width)&&isFinite(b.height)) box=mergeBounds(box,{x:b.x,y:b.y,width:b.width,height:b.height});
    }
  }catch(_){}
  images.forEach(im=>{
    box=mergeBounds(box,{x:im.cx-im.w/2,y:im.cy-im.h/2,width:im.w,height:im.h});
  });
  if(!box||box.width<1||box.height<1) box=visibleWorldBounds();
  const pad=Math.max(24,48/zoom);
  return {x:box.x-pad,y:box.y-pad,width:Math.max(200,box.width+pad*2),height:Math.max(160,box.height+pad*2)};
}

function exportClone(bounds,scale,forRaster){
  const outW=Math.round(bounds.width*scale), outH=Math.round(bounds.height*scale);
  const clone=svg.cloneNode(true);
  clone.setAttribute('xmlns','http://www.w3.org/2000/svg');
  clone.setAttribute('xmlns:xlink','http://www.w3.org/1999/xlink');
  clone.setAttribute('width',outW);
  clone.setAttribute('height',outH);
  clone.setAttribute('viewBox',`0 0 ${bounds.width} ${bounds.height}`);
  const clonedViewport=clone.querySelector('#viewport');
  if(clonedViewport) clonedViewport.setAttribute('transform',`translate(${-bounds.x},${-bounds.y})`);
  clone.querySelector('#selectionGroup')?.remove();
  clone.querySelector('#previewGroup')?.remove();
  clone.querySelector('#imgBorder')?.remove();
  clone.querySelectorAll('.resize-handle').forEach(n=>n.remove());
  if(forRaster) clone.querySelectorAll('[vector-effect]').forEach(n=>n.removeAttribute('vector-effect'));
  return {clone,outW,outH};
}

function exportSource(scaleOverride,forRaster){
  updateTransform();
  const bounds=contentBounds();
  // Use scaleOverride directly or default to 2 (since there's no persistent UI element)
  const requested=finiteNumber(scaleOverride||2,2);
  const maxScale=Math.min(4,12000/bounds.width,12000/bounds.height);
  const scale=clamp(Math.min(requested,maxScale),0.1,4);
  const {clone,outW,outH}=exportClone(bounds,scale,forRaster);
  const source='<?xml version="1.0" encoding="UTF-8"?>'+new XMLSerializer().serializeToString(clone);
  return {source,outW,outH,scale,requested};
}

function exportSVG(){
  const {source}=exportSource(1,false);
  downloadBlob(new Blob([source],{type:'image/svg+xml;charset=utf-8'}),`combat_plan_${safeStamp()}.svg`);
  showToast('SVG экспортирован','success');
}

function exportPNG(scaleOverride){
  const {source,outW,outH,scale,requested}=exportSource(scaleOverride,true);
  const url=URL.createObjectURL(new Blob([source],{type:'image/svg+xml;charset=utf-8'}));
  const canvas=document.createElement('canvas'); canvas.width=outW; canvas.height=outH;
  const img=new Image();
  img.onload=()=>{
    const ctx=canvas.getContext('2d');
    ctx.imageSmoothingEnabled=true; ctx.imageSmoothingQuality='high';
    ctx.drawImage(img,0,0,outW,outH); URL.revokeObjectURL(url);
    const done=blob=>{ if(blob) downloadBlob(blob,`combat_plan_${safeStamp()}_${scale.toFixed(1)}x.png`); else downloadBlob(new Blob([source],{type:'image/svg+xml;charset=utf-8'}),`combat_plan_${safeStamp()}.svg`); };
    if(canvas.toBlob) canvas.toBlob(done,'image/png',1);
    else {
      const a=document.createElement('a'); a.download=`combat_plan_${safeStamp()}_${scale.toFixed(1)}x.png`; a.href=canvas.toDataURL('image/png'); a.click();
    }
    showToast(scale<requested?`PNG экспортирован в ${scale.toFixed(1)}x из-за лимита размера`:'PNG экспортирован','success');
  };
  img.onerror=()=>{
    URL.revokeObjectURL(url);
    downloadBlob(new Blob([source],{type:'image/svg+xml;charset=utf-8'}),`combat_plan_${safeStamp()}.svg`);
    showToast('PNG не удалось собрать, сохранен SVG','error');
  };
  img.src=url;
}

// ─── INIT ─────────────────────────────────────────────────────────────────

// Initialize first sheet
function initSheets() {
  console.log('Initializing sheets...');
  sheets = [{ id: 1, name: 'Лист 1', elements: [], images: [], panX: 0, panY: 0, zoom: 1, history: [], redoStack: [] }];
  currentSheetId = 1;
  history = [];
  redoStack = [];
  console.log('Initial sheets:', sheets);
  renderSheetTabs();
}

function renderSheetTabs() {
  const bar = document.getElementById('sheetsBar');
  // Remove all existing tabs except the add button
  const addBtn = bar.querySelector('.add-sheet-btn');
  bar.innerHTML = '';
  
  sheets.forEach(sheet => {
    const tab = document.createElement('div');
    tab.className = 'sheet-tab' + (sheet.id === currentSheetId ? ' active' : '');
    tab.onclick = () => switchToSheet(sheet.id);
    
    const nameSpan = document.createElement('span');
    nameSpan.className = 'sheet-name';
    nameSpan.textContent = sheet.name;
    tab.appendChild(nameSpan);
    
    // Close button - only show if more than one sheet
    if (sheets.length > 1) {
      const closeBtn = document.createElement('button');
      closeBtn.className = 'close-sheet';
      closeBtn.innerHTML = '×';
      closeBtn.title = 'Удалить лист';
      closeBtn.onclick = (e) => { e.stopPropagation(); deleteSheet(sheet.id); };
      tab.appendChild(closeBtn);
    }
    
    bar.appendChild(tab);
  });
  
  // Add the "+" button back
  const newAddBtn = document.createElement('button');
  newAddBtn.className = 'add-sheet-btn';
  newAddBtn.innerHTML = '+';
  newAddBtn.title = 'Добавить лист';
  newAddBtn.onclick = addSheet;
  bar.appendChild(newAddBtn);
}

function addSheet() {
  const newId = sheets.length > 0 ? Math.max(...sheets.map(s => s.id)) + 1 : 1;
  // Save current sheet state before creating new one
  saveCurrentSheetState();
  
  const newSheet = { 
    id: newId, 
    name: `Лист ${newId}`, 
    elements: [], 
    images: [],
    panX: 0,
    panY: 0,
    zoom: 1,
    history: [],
    redoStack: []
  };
  sheets.push(newSheet);
  switchToSheet(newId);
  addLog(`Создан новый лист: ${newSheet.name}`, 'success');
  showToast(`Создан ${newSheet.name}`, 'success');
}

let _pendingSheetSwitch = null;

function switchToSheet(sheetId) {
  if (sheetId === currentSheetId) return;
  
  // Save current sheet state
  saveCurrentSheetState();
  
  // Switch to new sheet
  currentSheetId = sheetId;
  const sheet = sheets.find(s => s.id === sheetId);
  if (!sheet) return;
  
  // Mark this switch to prevent stale async callbacks
  _pendingSheetSwitch = sheetId;
  
  // Load sheet history
  loadSheetHistory();
  
  // Clear wide arrow masks to prevent memory leaks
  clearWideArrowMasks();
  
  // Clear and rebuild DOM
  while(elemGroup.firstChild) elemGroup.removeChild(elemGroup.firstChild);
  while(imgGrp.firstChild) imgGrp.removeChild(imgGrp.firstChild);
  while(selGrp.firstChild) selGrp.removeChild(selGrp.firstChild);
  while(previewGrp.firstChild) previewGrp.removeChild(previewGrp.firstChild);
  
  // Reset drawing and interaction states
  isPanning = false;
  isDrawing = false;
  imgDrag = null;
  dragState = null;
  resizeState = null;
  rubberState = null;
  drawPts = [];
  lastAddedPt = null;
  
  // Clear arrays before restoring
  images = [];
  
  // Restore elements first (synchronous)
  elements = [];
  sheet.elements.forEach(snap => {
    const data = cloneData(snap.data || {});
    const g = spawnEl({id: snap.id, type: snap.type, data: data, label: snap.label || ''});
    elemGroup.appendChild(g);
    elements.push({id: snap.id, type: snap.type, data: data, el: g, label: snap.label || ''});
  });
  
  // Restore images (asynchronous) with guard against stale callbacks
  let imagesLoaded = 0;
  const totalImages = sheet.images.length;
  const switchId = sheetId;
  
  sheet.images.forEach(imgData => {
    const img = new Image();
    img.onload = () => {
      if (_pendingSheetSwitch !== switchId) return; // Stale callback, ignore
      const svgImg = NS('image');
      svgImg.setAttribute('href', imgData.dataUrl);
      svgImg.setAttribute('width', imgData.w);
      svgImg.setAttribute('height', imgData.h);
      svgImg.setAttribute('x', imgData.cx - imgData.w/2);
      svgImg.setAttribute('y', imgData.cy - imgData.h/2);
      svgImg.setAttribute('preserveAspectRatio', 'none');
      
      const obj = {
        id: imgData.id,
        origW: imgData.origW,
        origH: imgData.origH,
        cx: imgData.cx,
        cy: imgData.cy,
        w: imgData.w,
        h: imgData.h,
        el: svgImg,
        dataUrl: imgData.dataUrl
      };
      
      images.push(obj);
      imgGrp.appendChild(svgImg);
      attachImageEvents(svgImg, obj);
      
      imagesLoaded++;
      if (imagesLoaded === totalImages) {
        if (_pendingSheetSwitch === switchId) finalizeSheetSwitch(sheet);
      }
    };
    img.onerror = () => {
      if (_pendingSheetSwitch !== switchId) return;
      imagesLoaded++;
      if (imagesLoaded === totalImages) {
        if (_pendingSheetSwitch === switchId) finalizeSheetSwitch(sheet);
      }
    };
    img.src = imgData.dataUrl;
  });
  
  // If no images, finalize immediately
  if (totalImages === 0) {
    if (_pendingSheetSwitch === switchId) finalizeSheetSwitch(sheet);
  }
}

function finalizeSheetSwitch(sheet) {
  // Update UI
  selectedIds.clear();
  selectedImgId = null;
  updateTransform();
  updateStatus();
  renderSheetTabs();
  
  // Восстанавливаем текущий инструмент и состояние canvasArea
  setTool(currentTool, currentSymbol ? document.querySelector(`.sym-btn[data-symbol="${currentSymbol}"]`) : null);
  
  // Обновляем интерактивность изображений после переключения
  updateImageInteractivity();
  
  addLog(`Переключен на лист: ${sheet.name}`, 'info');
  showToast(`Переключен на ${sheet.name}`, 'success');
}

function saveCurrentSheetState() {
  const sheet = sheets.find(s => s.id === currentSheetId);
  if (!sheet) return;
  
  sheet.elements = elements.map(el => ({
    id: el.id,
    type: el.type,
    data: cloneData(el.data),
    label: el.el.dataset.label || ''
  }));
  
  sheet.images = images.map(im => ({
    id: im.id,
    dataUrl: im.dataUrl,
    cx: im.cx,
    cy: im.cy,
    w: im.w,
    h: im.h,
    origW: im.origW,
    origH: im.origH
  }));
  
  sheet.panX = panX;
  sheet.panY = panY;
  sheet.zoom = zoom;
  sheet.history = history.slice();
  sheet.redoStack = redoStack.slice();
}

function deleteSheet(sheetId) {
  if (sheets.length <= 1) {
    showToast('Нельзя удалить единственный лист', 'error');
    return;
  }
  
  const sheet = sheets.find(s => s.id === sheetId);
  if (!sheet) return;
  
  if (!confirm(`Удалить лист "${sheet.name}"?`)) return;
  
  // If deleting current sheet, switch to another one first
  if (sheetId === currentSheetId) {
    const otherSheet = sheets.find(s => s.id !== sheetId);
    if (otherSheet) {
      switchToSheet(otherSheet.id);
    }
  }
  
  // Remove from array
  sheets = sheets.filter(s => s.id !== sheetId);
  renderSheetTabs();
  
  showToast(`Лист "${sheet.name}" удален`, 'success');
}

['colorFriendly','colorEnemy'].forEach(id=>{
  document.getElementById(id).addEventListener('input',()=>{
    setForceSide(activeForce);
    if(currentTool==='symbol'&&currentSymbol){ createSymPreview(); refreshSymPreviewPos(); }
  });
});

// Initialize sheets and check for room
initSheets();
setForceSide('friendly');
setTool('select');
updateTransform();
updateUndoRedoButtons();
checkRoomOnLoad(); // Check if we should join a room from URL
