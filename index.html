<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Конструктор боевых операций</title>
<style>
:root {
  --bg: #0e0e18;
  --panel: #17172a;
  --panel2: #1e1e34;
  --border: #2e2e4e;
  --accent: #f0c040;
  --accent-dim: rgba(240,192,64,.15);
  --friendly: #e04040;
  --enemy: #4060e0;
  --success: #62d394;
  --danger: #ff6b6b;
  --text: #d8d8ec;
  --text-dim: #7070a0;
  --shadow: 0 14px 40px rgba(0,0,0,.32);
}
*{margin:0;padding:0;box-sizing:border-box;user-select:none;-webkit-user-select:none;-moz-user-select:none;-ms-user-select:none}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden}
.app{display:flex;height:100vh}

.sidebar{width:294px;min-width:294px;background:linear-gradient(180deg,var(--panel),#121224);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.sidebar-header{padding:12px 14px;font-size:12px;font-weight:800;letter-spacing:.7px;border-bottom:1px solid var(--border);background:rgba(0,0,0,.28);display:flex;align-items:center;gap:7px;white-space:nowrap;color:var(--accent)}
.sidebar-scroll{flex:1;overflow-y:auto;overflow-x:hidden}
.sidebar-scroll::-webkit-scrollbar{width:5px}
.sidebar-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.sidebar-scroll::-webkit-scrollbar-thumb:hover{background:var(--accent)}

.sec-title{padding:8px 14px 4px;font-size:9.5px;text-transform:uppercase;color:var(--text-dim);letter-spacing:1.2px;font-weight:600;border-top:1px solid rgba(255,255,255,.04);margin-top:2px}
.act-btn{display:flex;align-items:center;gap:8px;padding:7px 14px;background:none;border:none;color:var(--text);cursor:pointer;font-size:12px;width:100%;text-align:left;transition:background .12s,color .12s,border-color .12s,transform .12s;border-left:2px solid transparent}
.act-btn:hover{background:rgba(255,255,255,.07);color:#fff}
.act-btn:active{transform:translateY(1px)}
.act-btn.active{background:linear-gradient(90deg,var(--accent-dim),rgba(240,192,64,.05));border-left-color:var(--accent);color:var(--accent)}
.act-btn .icon{font-size:13px;width:18px;text-align:center;flex-shrink:0}

.sym-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;padding:4px 10px 9px}
.sym-btn{background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:6px;padding:5px 2px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;transition:.12s;color:var(--text);font-size:8.5px;white-space:nowrap}
.sym-btn:hover{background:var(--accent-dim);border-color:var(--accent)}
.sym-btn.active{background:rgba(240,192,64,.25);border-color:var(--accent);box-shadow:0 0 0 1px var(--accent)}
.sym-btn svg{width:32px;height:22px;flex-shrink:0}

.slider-row{padding:6px 14px}
.slider-row label{display:block;font-size:10.5px;color:var(--text-dim);margin-bottom:3px}
.slider-row input[type=range]{width:100%;accent-color:var(--accent)}
.slider-row .val{font-size:10.5px;color:var(--accent);text-align:right}
.color-row{display:flex;align-items:center;gap:7px;padding:6px 14px;flex-wrap:wrap}
.color-row label{font-size:11px;white-space:nowrap;color:var(--text-dim)}
.color-row input[type=color]{width:30px;height:24px;border:1px solid var(--border);background:rgba(255,255,255,.04);cursor:pointer;border-radius:4px;padding:0}
.force-toggle{display:grid;grid-template-columns:1fr 1fr;gap:5px;padding:5px 14px 7px}
.force-btn{border:1px solid var(--border);background:rgba(255,255,255,.045);color:var(--text);border-radius:6px;padding:6px 8px;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:.12s}
.force-btn:before{content:'';width:9px;height:9px;border-radius:50%;background:var(--friendly);box-shadow:0 0 0 2px rgba(255,255,255,.08)}
.force-btn.enemy:before{background:var(--enemy)}
.force-btn.active{border-color:var(--accent);background:var(--accent-dim);color:var(--accent);box-shadow:0 0 0 1px rgba(240,192,64,.12)}
.export-row{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center;padding:7px 14px 4px;font-size:11px;color:var(--text-dim)}
.export-row select{background:rgba(255,255,255,.07);border:1px solid var(--border);color:var(--text);border-radius:5px;padding:4px 8px;outline:none}
.divider{height:1px;background:var(--border);margin:2px 0}
.sidebar-footer{border-top:1px solid var(--border);flex-shrink:0;background:rgba(0,0,0,.24);padding-bottom:6px}

.canvas-area{flex:1;position:relative;overflow:hidden;background:#191926}
.canvas-area svg{width:100%;height:100%;display:block}
.canvas-area.tool-draw svg,.canvas-area.tool-symbol svg{cursor:crosshair}
.canvas-area.tool-pan svg{cursor:grab}
.canvas-area.panning svg{cursor:grabbing}

.topbar{position:absolute;top:10px;left:50%;transform:translateX(-50%);display:flex;gap:3px;background:rgba(23,23,42,.95);border:1px solid var(--border);border-radius:8px;padding:3px;backdrop-filter:blur(8px);box-shadow:var(--shadow)}
.topbar .act-btn{border-radius:5px;padding:5px 11px;font-size:11px;border-left:none}

/* Sheets bar at the top */
.sheets-bar{position:absolute;top:0;left:0;right:0;height:42px;background:rgba(23,23,42,.96);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 12px;gap:6px;overflow-x:auto;overflow-y:hidden;z-index:20;backdrop-filter:blur(8px)}
.sheets-bar::-webkit-scrollbar{height:4px}
.sheets-bar::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.sheet-tab{background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:6px;padding:6px 12px;font-size:11px;color:var(--text);cursor:pointer;display:flex;align-items:center;gap:6px;white-space:nowrap;transition:.12s;flex-shrink:0}
.sheet-tab:hover{background:rgba(255,255,255,.08)}
.sheet-tab.active{background:var(--accent-dim);border-color:var(--accent);color:var(--accent)}
.sheet-tab .sheet-name{max-width:120px;overflow:hidden;text-overflow:ellipsis}
.sheet-tab .close-sheet{width:16px;height:16px;border-radius:50%;border:none;background:rgba(255,255,255,.1);color:var(--text);font-size:12px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.12s}
.sheet-tab .close-sheet:hover{background:var(--danger);color:#fff}
.add-sheet-btn{width:32px;height:32px;background:rgba(255,255,255,.07);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.12s;flex-shrink:0}
.add-sheet-btn:hover{background:var(--accent-dim);border-color:var(--accent);color:var(--accent)}

.zoom-wrap{position:absolute;bottom:36px;right:14px;display:flex;flex-direction:column;gap:3px}
.zoom-btn{width:30px;height:30px;background:rgba(23,23,42,.9);border:1px solid var(--border);color:var(--text);font-size:15px;border-radius:5px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.12s}
.zoom-btn:hover{background:var(--accent-dim);border-color:var(--accent)}
.zoom-lbl{position:absolute;bottom:10px;right:14px;background:rgba(23,23,42,.9);border:1px solid var(--border);border-radius:5px;padding:3px 9px;font-size:11px;color:var(--accent);font-weight:600;pointer-events:none;font-variant-numeric:tabular-nums}

.props-panel{position:absolute;right:10px;top:10px;width:210px;background:rgba(23,23,42,.97);border:1px solid var(--border);border-radius:8px;padding:10px;display:none;z-index:10;backdrop-filter:blur(8px)}
.props-panel.visible{display:block}
.props-panel h4{font-size:11px;margin-bottom:7px;color:var(--accent);font-weight:600;letter-spacing:.3px}
.prop-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;font-size:11px;color:var(--text-dim)}
.prop-row input[type=range]{width:95px;accent-color:var(--accent)}
.prop-input{width:100%;background:rgba(255,255,255,.07);border:1px solid var(--border);color:var(--text);padding:4px 7px;border-radius:4px;font-size:11px;margin-top:2px;outline:none;transition:.12s}
.prop-input:focus{border-color:var(--accent)}

.resize-handle{fill:var(--accent);stroke:#17172a;stroke-width:1.5;cursor:nwse-resize;pointer-events:all}
.resize-handle:hover{fill:#ffd966}
#fileInput{display:none}
#projectInput{display:none}

.coord-display{position:absolute;bottom:10px;left:14px;font-size:10px;color:var(--text-dim);font-variant-numeric:tabular-nums;pointer-events:none;font-family:'Courier New',monospace}
.status-display{position:absolute;bottom:31px;left:14px;background:rgba(23,23,42,.84);border:1px solid var(--border);border-radius:6px;padding:4px 8px;font-size:11px;color:var(--text);pointer-events:none;backdrop-filter:blur(8px);box-shadow:var(--shadow)}
.toast{position:absolute;left:50%;bottom:18px;transform:translate(-50%,10px);background:rgba(17,17,31,.96);border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:7px;color:var(--text);padding:8px 12px;font-size:12px;box-shadow:var(--shadow);opacity:0;pointer-events:none;transition:.18s;z-index:30;max-width:min(520px,calc(100% - 40px));text-align:center}
.toast.visible{opacity:1;transform:translate(-50%,0)}
.toast.success{border-left-color:var(--success)}
.toast.error{border-left-color:var(--danger)}

/* Logs panel */
.logs-panel{position:absolute;bottom:60px;right:14px;width:380px;max-height:280px;background:rgba(23,23,42,.97);border:1px solid var(--border);border-radius:8px;padding:10px;display:none;z-index:25;backdrop-filter:blur(8px);flex-direction:column}
.logs-panel.visible{display:flex}
.logs-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.logs-header h4{font-size:11px;color:var(--accent);font-weight:600;letter-spacing:.3px}
.logs-actions{display:flex;gap:6px}
.logs-btn{background:rgba(255,255,255,.08);border:1px solid var(--border);color:var(--text);border-radius:4px;padding:3px 8px;font-size:10px;cursor:pointer;transition:.12s}
.logs-btn:hover{background:rgba(255,255,255,.12);border-color:var(--accent)}
.logs-content{flex:1;overflow-y:auto;font-family:'Courier New',monospace;font-size:9.5px;color:var(--text-dim);background:rgba(0,0,0,.25);border:1px solid var(--border);border-radius:4px;padding:6px;min-height:120px;white-space:pre-wrap;word-break:break-all}
.log-entry{margin-bottom:3px;border-bottom:1px solid rgba(255,255,255,.03);padding-bottom:2px}
.log-entry.info{color:#88aaff}
.log-entry.success{color:var(--success)}
.log-entry.error{color:var(--danger)}
.log-entry.warning{color:#ffcc66}
.log-timestamp{color:var(--text-dim);opacity:.6;margin-right:6px}

/* Images only selectable in select mode */
#imageGroup image{pointer-events:none}
#imageGroup image.selectable{pointer-events:all}

/* Multiplayer UI styles */
.multiplayer-section{padding:8px 14px;border-top:1px solid rgba(255,255,255,.04);margin-top:4px}
.mp-row{display:flex;align-items:center;gap:6px;margin-bottom:6px;flex-wrap:wrap}
.mp-btn{background:rgba(240,192,64,.15);border:1px solid var(--accent);color:var(--accent);border-radius:5px;padding:5px 10px;font-size:10.5px;cursor:pointer;transition:.12s;white-space:nowrap}
.mp-btn:hover{background:rgba(240,192,64,.25)}
.mp-btn:disabled{opacity:.4;cursor:not-allowed}
.mp-input{background:rgba(255,255,255,.07);border:1px solid var(--border);color:var(--text);border-radius:4px;padding:4px 7px;font-size:10.5px;width:100%;outline:none}
.mp-input:focus{border-color:var(--accent)}
.mp-status{font-size:9.5px;color:var(--text-dim);padding:4px 0}
.mp-status.connected{color:var(--success)}
.mp-status.error{color:var(--danger)}
.player-list{max-height:80px;overflow-y:auto;font-size:9.5px;color:var(--text-dim)}
.player-item{display:flex;align-items:center;gap:5px;padding:2px 0}
.player-item:before{content:'●';color:var(--success);font-size:8px}
.player-item.host:before{color:var(--accent)}
.copy-link-btn{font-size:9px;padding:3px 6px;background:rgba(255,255,255,.08);border:1px solid var(--border);color:var(--text);border-radius:3px;cursor:pointer}
.copy-link-btn:hover{background:rgba(255,255,255,.12)}
.export-quality-btn{background:rgba(255,255,255,.07);border:1px solid var(--border);color:var(--text);padding:8px;border-radius:5px;font-size:11px;cursor:pointer;transition:.12s}
.export-quality-btn:hover{background:var(--accent-dim)}
</style>
</head>
<body>
<div class="app">
<div class="sidebar">
  <div class="sidebar-header">
    <button id="fileMenuBtn" class="act-btn" style="width:auto;padding:4px 8px;border-radius:4px;margin-right:4px;" onclick="toggleFileMenu()">📁 Файл</button>
    <button id="logsTabBtn" class="act-btn" style="width:auto;padding:4px 8px;border-radius:4px;margin-right:8px;" onclick="toggleLogsPanel()">📋 Логи</button>
    <span>⚔ КОНСТРУКТОР ОПЕРАЦИЙ</span>
  </div>
  
  <!-- Выпадающее меню Файл -->
  <div id="fileMenu" style="display:none;position:absolute;top:42px;left:10px;background:rgba(23,23,42,.98);border:1px solid var(--border);border-radius:6px;padding:4px;z-index:100;box-shadow:var(--shadow);min-width:200px;">
    <button class="act-btn" onclick="document.getElementById('fileInput').click();toggleFileMenu();" style="border-radius:4px;"><span class="icon">📁</span> Загрузить изображение</button>
    <button class="act-btn" onclick="pasteFromClipboard();toggleFileMenu();" style="border-radius:4px;"><span class="icon">📋</span> Вставить из буфера</button>
    <div class="divider" style="margin:4px 0;"></div>
    <button class="act-btn" onclick="saveProject();toggleFileMenu();" style="border-radius:4px;"><span class="icon">💾</span> Сохранить проект</button>
    <button class="act-btn" onclick="document.getElementById('projectInput').click();toggleFileMenu();" style="border-radius:4px;"><span class="icon">📂</span> Загрузить проект</button>
    <div class="divider" style="margin:4px 0;"></div>
    <button class="act-btn" onclick="showExportDialog();toggleFileMenu();" style="border-radius:4px;"><span class="icon">💾</span> Экспорт PNG</button>
    <button class="act-btn" onclick="exportSVG();toggleFileMenu();" style="border-radius:4px;"><span class="icon">▣</span> Экспорт SVG</button>
  </div>
  
  <div class="sidebar-scroll">

    <div class="sec-title">Мультиплеер (P2P)</div>
    <div class="multiplayer-section">
      <div class="mp-row">
        <button class="mp-btn" id="createRoomBtn" onclick="createRoom()">🏠 Создать комнату</button>
        <button class="mp-btn" id="leaveRoomBtn" onclick="leaveRoom()" style="display:none;background:rgba(255,107,107,.15);border-color:var(--danger);color:var(--danger)">✖ Выйти</button>
      </div>
      <div class="mp-row" id="joinRow">
        <input type="text" class="mp-input" id="roomIdInput" placeholder="ID комнаты для подключения">
        <button class="mp-btn" onclick="joinRoom()">➜ Войти</button>
      </div>
      <div class="mp-row" id="shareRow" style="display:none;">
        <input type="text" class="mp-input" id="roomLinkInput" readonly onclick="this.select()">
        <button class="copy-link-btn" onclick="copyRoomLink()">Копия</button>
      </div>
      <div class="mp-status" id="mpStatus">Не подключено</div>
      <div class="player-list" id="playerList"></div>
    </div>
    <div class="divider"></div>

    <div class="sec-title">Инструменты</div>
    <button class="act-btn tool-btn" data-tool="marker"          onclick="setTool('marker')"><span class="icon">🖍</span> Маркер</button>
    <button class="act-btn tool-btn" data-tool="flex-arrow"      onclick="setTool('flex-arrow')"><span class="icon">⟶</span> Гибкая стрелка</button>
    <button class="act-btn tool-btn" data-tool="flex-arrow-dash" onclick="setTool('flex-arrow-dash')"><span class="icon">⤏</span> Штриховая стрелка</button>
    <button class="act-btn tool-btn" data-tool="wide-arrow"      onclick="setTool('wide-arrow')"><span class="icon">➤</span> Широкая стрелка</button>
    <button class="act-btn tool-btn" data-tool="line"            onclick="setTool('line')"><span class="icon">━</span> Прямая линия</button>
    <button class="act-btn tool-btn" data-tool="area"            onclick="setTool('area')"><span class="icon">▭</span> Зона / район</button>
    <button class="act-btn tool-btn" data-tool="boundary"        onclick="setTool('boundary')"><span class="icon">▥</span> Рубеж / граница</button>
    <button class="act-btn tool-btn" data-tool="measure"         onclick="setTool('measure')"><span class="icon">↔</span> Линейка</button>
    <button class="act-btn tool-btn" data-tool="text"            onclick="setTool('text')"><span class="icon">T</span> Текстовая метка</button>
    <button class="act-btn tool-btn" data-tool="point"           onclick="setTool('point')"><span class="icon">●</span> Точка</button>

    <div class="sec-title">Цвет</div>
    <div class="color-row">
      <label>Союзник:</label><input type="color" id="colorFriendly" value="#e04040">
      <label>Противник:</label><input type="color" id="colorEnemy" value="#4060e0">
    </div>
    <div class="force-toggle">
      <button class="force-btn active" id="forceFriendlyBtn" onclick="setForceSide('friendly')">Союзник</button>
      <button class="force-btn enemy" id="forceEnemyBtn" onclick="setForceSide('enemy')">Противник</button>
    </div>
    <div class="divider"></div>
  </div>

  <div class="sidebar-footer">
    <button class="act-btn" onclick="undoAction()" id="undoBtn"><span class="icon">↩</span> Отменить (Ctrl+Z)</button>
    <button class="act-btn" onclick="redoAction()" id="redoBtn"><span class="icon">↪</span> Вперед (Ctrl+Y)</button>
    <button class="act-btn" onclick="clearAll()"><span class="icon">🗑</span> Очистить всё</button>
  </div>
</div>

<div class="canvas-area" id="canvasArea">
  <!-- Sheets bar at the top -->
  <div class="sheets-bar" id="sheetsBar">
    <button class="add-sheet-btn" onclick="addSheet()" title="Добавить лист">+</button>
  </div>
  
  <svg id="mainSvg" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <pattern id="gridPattern" width="50" height="50" patternUnits="userSpaceOnUse">
        <path d="M 50 0 L 0 0 0 50" fill="none" stroke="rgba(255,255,255,.035)" stroke-width="1"/>
      </pattern>
      <pattern id="gridPatternLarge" width="200" height="200" patternUnits="userSpaceOnUse">
        <path d="M 200 0 L 0 0 0 200" fill="none" stroke="rgba(255,255,255,.06)" stroke-width="1"/>
      </pattern>
    </defs>
    <g id="viewport">
      <rect x="-9999" y="-9999" width="19998" height="19998" fill="#191926"/>
      <rect x="-9999" y="-9999" width="19998" height="19998" fill="url(#gridPattern)"/>
      <rect x="-9999" y="-9999" width="19998" height="19998" fill="url(#gridPatternLarge)"/>
      <g id="imageGroup"></g>
      <g id="elementsGroup"></g>
      <g id="selectionGroup"></g>
    </g>
    <g id="previewGroup"></g>
  </svg>

  <div class="topbar">
    <button class="act-btn" id="topSelectBtn" onclick="setTool('select')"><span class="icon">🖱</span> Выбор</button>
    <button class="act-btn" id="topPanBtn"    onclick="setTool('pan')"><span class="icon">✋</span> Перемещение</button>
    <button class="act-btn"                   onclick="duplicateSelected()"><span class="icon">⧉</span> Дублировать</button>
    <button class="act-btn"                   onclick="deleteSelected()"><span class="icon">🗑</span> Удалить</button>
  </div>

  <div class="zoom-wrap">
    <button class="zoom-btn" onclick="zoomBy(1.3)">+</button>
    <button class="zoom-btn" onclick="zoomBy(1/1.3)">−</button>
    <button class="zoom-btn" onclick="zoomReset()">⟲</button>
  </div>
  <div class="zoom-lbl" id="zoomLbl">100%</div>
  <div class="status-display" id="statusDisplay">Выбор · Союзник</div>
  <div class="coord-display" id="coordDisplay">0, 0</div>
  <div class="toast" id="toast"></div>

  <!-- Logs Panel -->
  <div class="logs-panel" id="logsPanel">
    <div class="logs-header">
      <h4>📋 Логи системы</h4>
      <div class="logs-actions">
        <button class="logs-btn" onclick="clearLogs()">Очистить</button>
        <button class="logs-btn" onclick="copyLogs()">Копировать</button>
        <button class="logs-btn" onclick="toggleLogs()">✕</button>
      </div>
    </div>
    <div class="logs-content" id="logsContent"></div>
  </div>

  <div class="props-panel" id="propsPanel">
    <h4 id="propsTitle">Свойства</h4>
    <div class="prop-row"><span>Толщина</span><input type="range" id="propStroke" min="1" max="10" value="2"></div>
    <div class="prop-row"><span>Прозрачность</span><input type="range" id="propOpacity" min="0.1" max="1" step="0.05" value="1"></div>
    <div class="prop-row" id="scaleRow"><span>Масштаб</span><input type="range" id="propScale" min="25" max="200" value="100"></div>
    <div class="prop-row"><span>Подпись</span></div>
    <input class="prop-input" type="text" id="propLabel" placeholder="Введите подпись…">
  </div>
</div>
</div>
<input type="file" id="fileInput" accept="image/*" multiple>
<input type="file" id="projectInput" accept=".json,application/json">

<!-- PeerJS library for WebRTC -->
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

let logEntries = [];

function addLog(message, type = 'info') {
  const timestamp = new Date().toLocaleTimeString('ru-RU');
  const entry = { timestamp, message, type };
  logEntries.push(entry);
  
  if (logsContent) {
    const div = document.createElement('div');
    div.className = `log-entry ${type}`;
    div.innerHTML = `<span class="log-timestamp">[${timestamp}]</span>${escapeHtml(message)}`;
    logsContent.appendChild(div);
    logsContent.scrollTop = logsContent.scrollHeight;
  }
}

function clearLogs() {
  logEntries = [];
  if (logsContent) logsContent.innerHTML = '';
  addLog('Логи очищены', 'info');
}

function copyLogs() {
  if (logEntries.length === 0) {
    showToast('Нет логов для копирования', 'warning');
    return;
  }
  const text = logEntries.map(e => `[${e.timestamp}] ${e.message}`).join('\n');
  navigator.clipboard.writeText(text).then(() => {
    showToast('Логи скопированы в буфер обмена', 'success');
    addLog('Логи скопированы в буфер обмена', 'success');
  }).catch(err => {
    showToast('Ошибка копирования', 'error');
    addLog(`Ошибка копирования логов: ${err.message}`, 'error');
  });
}

function NS(tag){ return document.createElementNS('http://www.w3.org/2000/svg', tag); }
function dist(a,b){ return Math.hypot(a.x-b.x, a.y-b.y); }
function clamp(v,lo,hi){ return Math.max(lo, Math.min(hi, v)); }
function finiteNumber(v,fallback){ const n=Number(v); return Number.isFinite(n)?n:fallback; }

/** Sanitize HTML to prevent XSS */
function escapeHtml(str){
  if(!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');
}

/** Debounce function for performance optimization */
function debounce(func, wait){
  let timeout;
  return function executedFunction(...args){
    const later = () => { clearTimeout(timeout); func(...args); };
    clearTimeout(timeout);
    timeout = setTimeout(later, wait);
  };
}

// Catmull-Rom → Bezier
function smoothPath(pts){
  if(!pts||pts.length<2) return '';
  if(pts.length===2) return `M${pts[0].x.toFixed(1)},${pts[0].y.toFixed(1)}L${pts[1].x.toFixed(1)},${pts[1].y.toFixed(1)}`;
  let d=`M${pts[0].x.toFixed(1)},${pts[0].y.toFixed(1)}`;
  for(let i=0;i<pts.length-1;i++){
    const p0=pts[Math.max(0,i-1)],p1=pts[i],p2=pts[i+1],p3=pts[Math.min(pts.length-1,i+2)];
    const cp1x=p1.x+(p2.x-p0.x)/6, cp1y=p1.y+(p2.y-p0.y)/6;
    const cp2x=p2.x-(p3.x-p1.x)/6, cp2y=p2.y-(p3.y-p1.y)/6;
    d+=`C${cp1x.toFixed(1)},${cp1y.toFixed(1)} ${cp2x.toFixed(1)},${cp2y.toFixed(1)} ${p2.x.toFixed(1)},${p2.y.toFixed(1)}`;
  }
  return d;
}

// Catmull-Rom → Bezier (замкнутый путь для зон/районов)
function smoothPathClosed(pts){
  if(!pts||pts.length<2) return '';
  if(pts.length===2) return `M${pts[0].x.toFixed(1)},${pts[0].y.toFixed(1)}L${pts[1].x.toFixed(1)},${pts[1].y.toFixed(1)}Z`;
  // Дублируем точки для замыкания
  const ext=[pts[pts.length-1],...pts,pts[0],pts[1]];
  let d='';
  for(let i=1;i<pts.length+1;i++){
    const p0=ext[i-1],p1=ext[i],p2=ext[i+1],p3=ext[i+2];
    const cp1x=p1.x+(p2.x-p0.x)/6, cp1y=p1.y+(p2.y-p0.y)/6;
    const cp2x=p2.x-(p3.x-p1.x)/6, cp2y=p2.y-(p3.y-p1.y)/6;
    if(i===1) d+=`M${p1.x.toFixed(1)},${p1.y.toFixed(1)}`;
    d+=`C${cp1x.toFixed(1)},${cp1y.toFixed(1)} ${cp2x.toFixed(1)},${cp2y.toFixed(1)} ${p2.x.toFixed(1)},${p2.y.toFixed(1)}`;
  }
  return d+'Z';
}

// Ramer-Douglas-Peucker
function simplify(pts,eps){
  eps=eps||1.5;
  if(pts.length<=2) return pts.slice();
  let maxD=0,maxI=0;
  for(let i=1;i<pts.length-1;i++){
    const d=ptLineDist(pts[i],pts[0],pts[pts.length-1]);
    if(d>maxD){maxD=d;maxI=i;}
  }
  if(maxD>eps){
    const l=simplify(pts.slice(0,maxI+1),eps);
    const r=simplify(pts.slice(maxI),eps);
    return [...l.slice(0,-1),...r];
  }
  return [pts[0],pts[pts.length-1]];
}

function ptLineDist(p,a,b){
  const dx=b.x-a.x,dy=b.y-a.y,len2=dx*dx+dy*dy;
  if(!len2) return dist(p,a);
  const t=clamp(((p.x-a.x)*dx+(p.y-a.y)*dy)/len2,0,1);
  return Math.hypot(p.x-a.x-t*dx,p.y-a.y-t*dy);
}

// ─── WIDE ARROW CORE ─────────────────────────────────────────────────────
function computeWideArrow(pts) {
  if (!pts || pts.length < 2) return null;
  const arc = [0];
  for (let i = 1; i < pts.length; i++) arc.push(arc[i-1] + dist(pts[i-1], pts[i]));
  const L = arc[arc.length - 1];
  if (L < 4) return null;
  const minW  = Math.max(2, L * 0.022);
  const maxW  = L * 0.13;
  const tipHW = maxW * 1.75;
  const tipL  = maxW * 1.55;
  function tanAt(i) {
    let dx, dy;
    if (pts.length === 2) { dx = pts[1].x-pts[0].x; dy = pts[1].y-pts[0].y; }
    else if (i === 0)               { dx = pts[1].x-pts[0].x;   dy = pts[1].y-pts[0].y; }
    else if (i === pts.length - 1)  { dx = pts[i].x-pts[i-1].x; dy = pts[i].y-pts[i-1].y; }
    else                            { dx = pts[i+1].x-pts[i-1].x; dy = pts[i+1].y-pts[i-1].y; }
    const l = Math.hypot(dx,dy)||1;
    return {x:dx/l, y:dy/l};
  }
  const lPts=[], rPts=[];
  for (let i = 0; i < pts.length; i++) {
    const t   = arc[i] / L;
    const w   = minW + (maxW - minW) * (t * t);
    const tan = tanAt(i);
    const nx  = -tan.y, ny = tan.x;
    lPts.push({x: pts[i].x + nx*w, y: pts[i].y + ny*w});
    rPts.push({x: pts[i].x - nx*w, y: pts[i].y - ny*w});
  }
  const lastTan = tanAt(pts.length - 1);
  const lp      = pts[pts.length - 1];
  const tipPt   = {x: lp.x + lastTan.x*tipL,  y: lp.y + lastTan.y*tipL};
  const tnx     = -lastTan.y, tny = lastTan.x;
  const tipL2   = {x: lp.x + tnx*tipHW, y: lp.y + tny*tipHW};
  const tipR2   = {x: lp.x - tnx*tipHW, y: lp.y - tny*tipHW};
  const leftD  = smoothPath(lPts);
  const rRev   = rPts.slice().reverse();
  let d = leftD;
  d += `L${tipL2.x.toFixed(1)},${tipL2.y.toFixed(1)}`;
  d += `L${tipPt.x.toFixed(1)},${tipPt.y.toFixed(1)}`;
  d += `L${tipR2.x.toFixed(1)},${tipR2.y.toFixed(1)}`;
  for (let i = 0; i < rRev.length; i++) {
    const arr = rRev;
    if (i === 0) { d += `L${arr[0].x.toFixed(1)},${arr[0].y.toFixed(1)}`; continue; }
    const p0 = arr[Math.max(0,i-2)], p1=arr[i-1], p2=arr[i], p3=arr[Math.min(arr.length-1,i+1)];
    const cp1x=p1.x+(p2.x-p0.x)/6, cp1y=p1.y+(p2.y-p0.y)/6;
    const cp2x=p2.x-(p3.x-p1.x)/6, cp2y=p2.y-(p3.y-p1.y)/6;
    d += `C${cp1x.toFixed(1)},${cp1y.toFixed(1)} ${cp2x.toFixed(1)},${cp2y.toFixed(1)} ${p2.x.toFixed(1)},${p2.y.toFixed(1)}`;
  }
  d += 'Z';
  const all = [...lPts,...rPts,tipL2,tipR2,tipPt];
  const xs = all.map(p=>p.x), ys = all.map(p=>p.y);
  return { d, bbox: {x:Math.min(...xs), y:Math.min(...ys), w:Math.max(...xs)-Math.min(...xs), h:Math.max(...ys)-Math.min(...ys)} };
}

function buildWideArrow(pts, color) {
  const g = NS('g');
  g.dataset.label = '';
  g.classList.add('wide-arrow-el');
  const shape = computeWideArrow(pts);
  if (!shape) return g;
  g.dataset.waShape = shape.d;
  g.dataset.waColor = (color||'').toLowerCase();
  const uid = 'wa_' + (uidSeq++) + '_' + (Date.now() % 99999);
  const defs = NS('defs');
  const pat = NS('pattern');
  pat.id = 'hp_' + uid;
  pat.setAttribute('patternUnits', 'userSpaceOnUse');
  const ps = 9;
  pat.setAttribute('width',  ps);
  pat.setAttribute('height', ps);
  pat.setAttribute('patternTransform', 'rotate(-45 0 0)');
  const hl = NS('line');
  hl.setAttribute('x1','0'); hl.setAttribute('y1','0');
  hl.setAttribute('x2','0'); hl.setAttribute('y2', ps);
  hl.setAttribute('stroke', color);
  hl.setAttribute('stroke-width', '1.7');
  hl.setAttribute('stroke-opacity', '0.42');
  pat.appendChild(hl);
  defs.appendChild(pat);
  const clip = NS('clipPath');
  clip.id = 'cp_' + uid;
  const clipPth = NS('path');
  clipPth.setAttribute('d', shape.d);
  clip.appendChild(clipPth);
  defs.appendChild(clip);
  g.appendChild(defs);
  const body = NS('path');
  body.classList.add('wide-arrow-body');
  body.setAttribute('d', shape.d);
  body.setAttribute('fill', color);
  body.setAttribute('fill-opacity', '0.14');
  body.setAttribute('stroke', 'none');
  body.style.cursor = 'move';
  g.appendChild(body);
  const bb = shape.bbox;
  const hr = NS('rect');
  hr.classList.add('wide-arrow-hatch');
  hr.setAttribute('x',      bb.x - 2);
  hr.setAttribute('y',      bb.y - 2);
  hr.setAttribute('width',  bb.w + 4);
  hr.setAttribute('height', bb.h + 4);
  hr.setAttribute('fill',   `url(#hp_${uid})`);
  hr.setAttribute('clip-path', `url(#cp_${uid})`);
  hr.style.pointerEvents = 'none';
  g.appendChild(hr);
  const outline = NS('path');
  outline.classList.add('wide-arrow-outline');
  outline.setAttribute('d', shape.d);
  outline.setAttribute('fill', 'none');
  outline.setAttribute('stroke', color);
  outline.setAttribute('stroke-width', '2.5');
  outline.setAttribute('stroke-linejoin', 'round');
  outline.setAttribute('stroke-linecap', 'round');
  outline.setAttribute('vector-effect', 'non-scaling-stroke');
  outline.style.cursor = 'move';
  g.appendChild(outline);
  return g;
}

function wideArrowColor(color){ return (color||'').trim().toLowerCase(); }
function wideArrowBox(shape){
  if(!shape||!shape.bbox) return null;
  return {x:shape.bbox.x,y:shape.bbox.y,width:shape.bbox.w,height:shape.bbox.h};
}
function expandBox(box,pad){
  return {x:box.x-pad,y:box.y-pad,width:box.width+pad*2,height:box.height+pad*2};
}
function boxesOverlap(a,b,pad){
  if(!a||!b) return false;
  return a.x-pad<=b.x+b.width && a.x+a.width+pad>=b.x && a.y-pad<=b.y+b.height && a.y+a.height+pad>=b.y;
}

/** Fixed: Properly manage wide arrow merge defs without nesting */
function ensureWideArrowMergeDefs(){
  let defs=document.getElementById('wideArrowMergeDefs');
  if(defs) return defs;
  // Find or create root defs (first-level only)
  let rootDefs=svg.querySelector(':scope > defs');
  if(!rootDefs){ 
    rootDefs=NS('defs'); 
    svg.insertBefore(rootDefs,svg.firstChild); 
  }
  defs=NS('defs'); 
  defs.id='wideArrowMergeDefs'; 
  rootDefs.appendChild(defs);
  return defs;
}

/** Debounced version for performance - call this instead of updateWideArrowMerges directly */
const updateWideArrowMergesDebounced = debounce(function() {
  updateWideArrowMergesInternal();
}, 50);

function updateWideArrowMerges(){
  if (!elements.some(e => e.type === 'wide-arrow')) return;
  updateWideArrowMergesDebounced();
}

function updateWideArrowMergesInternal(){
  const mergeDefs=ensureWideArrowMergeDefs();
  // Clear existing masks properly
  while(mergeDefs.firstChild) mergeDefs.removeChild(mergeDefs.firstChild);
  
  const arrows=elements.filter(el=>el.type==='wide-arrow').map((el,order)=>{
    const shape=computeWideArrow(el.data.points);
    return {
      id:el.id,
      order,
      color:wideArrowColor(el.data.color),
      shape,
      box:wideArrowBox(shape),
      body:el.el.querySelector('.wide-arrow-body'),
      hatch:el.el.querySelector('.wide-arrow-hatch'),
      outline:el.el.querySelector('.wide-arrow-outline')
    };
  }).filter(a=>a.shape&&a.box&&a.outline);
  
  arrows.forEach(a=>{
    a.outline.removeAttribute('mask');
    if(a.body) a.body.removeAttribute('mask');
    if(a.hatch) a.hatch.removeAttribute('mask');
  });
  
  if(arrows.length<2) return;
  
  const makeMask=(maskId,box,blockers,strokePad)=>{
    const mask=NS('mask');
    mask.id=maskId;
    mask.setAttribute('maskUnits','userSpaceOnUse');
    mask.setAttribute('maskContentUnits','userSpaceOnUse');
    mask.setAttribute('x',box.x);
    mask.setAttribute('y',box.y);
    mask.setAttribute('width',box.width);
    mask.setAttribute('height',box.height);
    const white=NS('rect');
    white.setAttribute('x',box.x);
    white.setAttribute('y',box.y);
    white.setAttribute('width',box.width);
    white.setAttribute('height',box.height);
    white.setAttribute('fill','#fff');
    mask.appendChild(white);
    blockers.forEach(b=>{
      const cut=NS('path');
      cut.setAttribute('d',b.shape.d);
      cut.setAttribute('fill','#000');
      cut.setAttribute('stroke','#000');
      cut.setAttribute('stroke-width',strokePad);
      cut.setAttribute('stroke-linejoin','round');
      cut.setAttribute('stroke-linecap','round');
      mask.appendChild(cut);
    });
    mergeDefs.appendChild(mask);
    return maskId;
  };
  
  const pad=Math.max(8/zoom,2);
  arrows.forEach(a=>{
    const blockers=arrows.filter(b=>b.id!==a.id && b.color===a.color && boxesOverlap(a.box,b.box,pad));
    const box=expandBox(a.box,Math.max(40/zoom,12));
    if(blockers.length){
      const maskId=makeMask(`wa_merge_outline_${a.id}`,box,blockers,Math.max(10/zoom,2));
      a.outline.setAttribute('mask',`url(#${maskId})`);
    }
    const paintBlockers=blockers.filter(b=>b.order<a.order);
    if(paintBlockers.length){
      const maskId=makeMask(`wa_merge_paint_${a.id}`,box,paintBlockers,Math.max(3/zoom,1));
      if(a.body) a.body.setAttribute('mask',`url(#${maskId})`);
      if(a.hatch) a.hatch.setAttribute('mask',`url(#${maskId})`);
    }
  });
}

/** Clear wide arrow masks when deleting elements to prevent memory leaks */
function clearWideArrowMasks(){
  const mergeDefs=document.getElementById('wideArrowMergeDefs');
  if(mergeDefs){
    while(mergeDefs.firstChild) mergeDefs.removeChild(mergeDefs.firstChild);
  }
}

function previewWideArrow(pts, color) {
  clearPreview();
  if (pts.length < 2) return;
  const simple = simplify(pts, 0.5 / zoom);
  const shape  = computeWideArrow(simple);
  if (!shape) return;
  const g = NS('g');
  g.setAttribute('transform', `translate(${panX},${panY}) scale(${zoom})`);
  g.setAttribute('opacity', '0.62');
  const fill = NS('path');
  fill.setAttribute('d', shape.d);
  fill.setAttribute('fill', color);
  fill.setAttribute('fill-opacity', '0.18');
  fill.setAttribute('stroke', 'none');
  g.appendChild(fill);
  const hatchG = NS('g');
  hatchG.setAttribute('clip-path', 'none');
  const bb = shape.bbox;
  const step = Math.max(4, (bb.w + bb.h) / 18);
  const angle = -Math.PI / 4;
  const cos45 = Math.cos(angle), sin45 = Math.sin(angle);
  const diagLen = Math.hypot(bb.w, bb.h) * 1.5;
  for (let offset = -(bb.w + bb.h) * 0.5; offset < (bb.w + bb.h) * 1.5; offset += step) {
    const cx2 = bb.x + bb.w * 0.5 + offset;
    const cy2 = bb.y + bb.h * 0.5;
    const x1 = cx2 - cos45 * diagLen * 0.5, y1 = cy2 - sin45 * diagLen * 0.5;
    const x2 = cx2 + cos45 * diagLen * 0.5, y2 = cy2 + sin45 * diagLen * 0.5;
    const ln = NS('line');
    ln.setAttribute('x1', x1.toFixed(1)); ln.setAttribute('y1', y1.toFixed(1));
    ln.setAttribute('x2', x2.toFixed(1)); ln.setAttribute('y2', y2.toFixed(1));
    ln.setAttribute('stroke', color);
    ln.setAttribute('stroke-width', Math.max(1.5, 1.5));
    ln.setAttribute('stroke-opacity', '0.45');
    ln.style.pointerEvents = 'none';
    hatchG.appendChild(ln);
  }
  const previewDefs = NS('defs');
  const previewClip = NS('clipPath');
  previewClip.id = 'preview_clip_wa';
  const previewClipPth = NS('path');
  previewClipPth.setAttribute('d', shape.d);
  previewClip.appendChild(previewClipPth);
  previewDefs.appendChild(previewClip);
  g.appendChild(previewDefs);
  hatchG.setAttribute('clip-path', 'url(#preview_clip_wa)');
  g.appendChild(hatchG);
  const outline = NS('path');
  outline.setAttribute('d', shape.d);
  outline.setAttribute('fill', 'none');
  outline.setAttribute('stroke', color);
  outline.setAttribute('stroke-width', Math.max(2.5, 2.5));
  outline.setAttribute('stroke-linejoin', 'round');
  g.appendChild(outline);
  previewGrp.appendChild(g);
}

// ─── VIEWPORT ────────────────────────────────────────────────────────────
function updateTransform(){
  viewport.setAttribute('transform', `translate(${panX},${panY}) scale(${zoom})`);
  zoomLbl.textContent = Math.round(zoom*100)+'%';
  const zoomChanged=lastDecorZoom!==zoom;
  if(zoomChanged){
    elements.forEach(el=>{
      if(el.type==='symbol')
        el.el.setAttribute('transform',`translate(${el.data.x},${el.data.y}) scale(${(el.data.scale||1)/zoom})`);
      if(zoomResponsiveTypes.has(el.type)) rebuildEl(el);
      else updateLabel(el);
    });
    updateWideArrowMerges();
    lastDecorZoom=zoom;
  }
  images.forEach(im=>{ im.el.setAttribute('x',im.cx-im.w/2); im.el.setAttribute('y',im.cy-im.h/2); });
  if(zoomChanged&&selectedIds.size) drawSelBox();
  if(zoomChanged&&selectedImgId) showImageBorder();
  updateStatus();
  
  // Broadcast viewport change to peers (if host and not remote update)
  if(isHost && !isRemoteUpdate && connections.size > 0){
    addLog(`Вьюпорт: зум=${Math.round(zoom*100)}%, панорама=(${Math.round(panX)},${Math.round(panY)})`, 'info');
    broadcast({type:'viewport_change', zoom, panX, panY});
  }
}

function zoomBy(f){
  const r=canvasArea.getBoundingClientRect();
  panX=(r.width/2)-(r.width/2-panX)*f; panY=(r.height/2)-(r.height/2-panY)*f;
  zoom=clamp(zoom*f,0.04,23); updateTransform();
  if(currentTool==='symbol') refreshSymPreviewPos();
}
function zoomReset(){ zoom=1; panX=0; panY=0; updateTransform(); }

// Generate random room ID
function generateRoomId(){
  return 'room_' + Math.random().toString(36).substr(2, 9);
}

// Get URL parameter
function getUrlParam(name){
  const urlParams = new URLSearchParams(window.location.search);
  return urlParams.get(name);
}

// Update UI for multiplayer state
function updateMpUi(){
  const createBtn = document.getElementById('createRoomBtn');
  const leaveBtn = document.getElementById('leaveRoomBtn');
  const joinRow = document.getElementById('joinRow');
  const shareRow = document.getElementById('shareRow');
  const statusEl = document.getElementById('mpStatus');
  const playerList = document.getElementById('playerList');
  const roomLinkInput = document.getElementById('roomLinkInput');
  
  if(isHost){
    createBtn.style.display = 'none';
    leaveBtn.style.display = 'inline-block';
    joinRow.style.display = 'none';
    shareRow.style.display = 'flex';
    roomLinkInput.value = window.location.href;
    statusEl.textContent = `Хост (ID: ${peerId})`;
    statusEl.className = 'mp-status connected';
  } else if(peerId){
    createBtn.style.display = 'none';
    leaveBtn.style.display = 'inline-block';
    joinRow.style.display = 'none';
    shareRow.style.display = 'none';
    statusEl.textContent = `Подключен к: ${roomId}`;
    statusEl.className = 'mp-status connected';
  } else {
    createBtn.style.display = 'inline-block';
    leaveBtn.style.display = 'none';
    joinRow.style.display = 'flex';
    shareRow.style.display = 'none';
    statusEl.textContent = 'Не подключено';
    statusEl.className = 'mp-status';
  }
  
  // Update player list
  playerList.innerHTML = '';
  if(isHost){
    const hostItem = document.createElement('div');
    hostItem.className = 'player-item host';
    hostItem.textContent = 'Вы (Хост)';
    playerList.appendChild(hostItem);
    connections.forEach((conn, pid) => {
      const item = document.createElement('div');
      item.className = 'player-item';
      item.textContent = `Игрок (${pid.substr(0,6)}...)`;
      playerList.appendChild(item);
    });
  } else if(connections.size > 0){
    const hostItem = document.createElement('div');
    hostItem.className = 'player-item host';
    hostItem.textContent = `Хост (${roomId.substr(0,8)}...)`;
    playerList.appendChild(hostItem);
  }
}

// Create room (become host)
window.createRoom = function(){
  if(peer){ leaveRoom(); }
  
  roomId = generateRoomId();
  isHost = true;
  
  // Add room ID to URL without reload
  const newUrl = window.location.protocol + "//" + window.location.host + window.location.pathname + '?room=' + roomId;
  window.history.pushState({path:newUrl},'',newUrl);
  
  // Initialize PeerJS
  initPeer(roomId);
  
  addLog(`Создана комната: ${roomId} (Хост)`, 'success');
  showToast(`Комната создана: ${roomId}`, 'success');
};

// Join room (become client)
window.joinRoom = function(){
  const inputId = document.getElementById('roomIdInput').value.trim();
  if(!inputId){ showToast('Введите ID комнаты', 'error'); return; }
  
  if(peer){ leaveRoom(); }
  
  roomId = inputId;
  isHost = false;
  
  // Add room ID to URL
  const newUrl = window.location.protocol + "//" + window.location.host + window.location.pathname + '?room=' + roomId;
  window.history.pushState({path:newUrl},'',newUrl);
  
  // Initialize PeerJS and connect to host
  initPeer(null, roomId);
  
  addLog(`Подключение к комнате: ${roomId}...`, 'info');
  showToast(`Подключение к ${roomId}...`, 'success');
};

// Leave room
window.leaveRoom = function(){
  // Notify peers about disconnect (if host)
  if(isHost && connections.size > 0){
    addLog(`Хост закрывает комнату, отключение ${connections.size} клиентов`, 'warning');
  }
  
  // Close all connections
  connections.forEach((conn) => {
    try{
      conn.close();
    } catch(e){
      console.error('Error closing connection:', e);
    }
  });
  connections.clear();
  
  // Destroy peer
  if(peer){
    peer.destroy();
    peer = null;
  }
  
  // Reset state
  peerId = null;
  isHost = false;
  roomId = null;
  
  // Remove room from URL
  const newUrl = window.location.protocol + "//" + window.location.host + window.location.pathname;
  window.history.pushState({path:newUrl},'',newUrl);
  
  addLog('Отключено от комнаты', 'warning');
  updateMpUi();
  showToast('Отключено от комнаты', 'success');
};

// Copy room link
window.copyRoomLink = function(){
  const input = document.getElementById('roomLinkInput');
  input.select();
  document.execCommand('copy');
  addLog('Ссылка на комнату скопирована', 'success');
  showToast('Ссылка скопирована', 'success');
};

// Initialize PeerJS
function initPeer(hostId = null, connectTo = null){
  try{
    peer = new Peer(hostId, {
      debug: 2
    });
    
    peer.on('open', (id) => {
      peerId = id;
      console.log('My peer ID:', id);
      
      if(!isHost && connectTo){
        // Client: connect to host
        setTimeout(() => connectToHost(connectTo), 500);
      }
      
      updateMpUi();
    });
    
    peer.on('connection', (conn) => {
      // Host: someone is connecting
      handleConnection(conn);
    });
    
    peer.on('error', (err) => {
      console.error('PeerJS error:', err);
      if(err.type === 'unavailable-id'){
        showToast('ID комнаты занят, попробуйте другой', 'error');
      } else if(err.type === 'peer-unavailable'){
        showToast('Комната не найдена', 'error');
      } else {
        showToast('Ошибка подключения: ' + err.type, 'error');
      }
      leaveRoom();
    });
    
  } catch(e){
    console.error('Failed to initialize PeerJS:', e);
    showToast('Ошибка инициализации PeerJS', 'error');
  }
}

// Connect to host (client side)
function connectToHost(hostId){
  try{
    const conn = peer.connect(hostId);
    handleConnection(conn);
  } catch(e){
    console.error('Failed to connect:', e);
    showToast('Не удалось подключиться', 'error');
  }
}

// Handle connection (both host and client)
function handleConnection(conn){
  conn.on('open', () => {
    console.log('Connected to:', conn.peer);
    connections.set(conn.peer, conn);
    updateMpUi();
    
    // Setup data listener
    conn.on('data', handleIncomingData);
    
    const peerRole = isHost ? 'клиент' : 'хост';
    addLog(`Подключен ${peerRole}: ${conn.peer}`, 'success');
    
    // If I'm client, request sync from host
    if(!isHost){
      conn.send({type: 'request_sync'});
      addLog('Запрошена синхронизация у хоста', 'info');
    } else {
      addLog(`Клиент ${conn.peer} подключился к хосту`, 'info');
    }
  });
  
  conn.on('close', () => {
    console.log('Disconnected from:', conn.peer);
    const wasHost = connections.has(conn.peer);
    connections.delete(conn.peer);
    updateMpUi();
    if(wasHost){
      addLog(`Отключен пользователь: ${conn.peer}`, 'warning');
    }
  });
  
  conn.on('error', (err) => {
    console.error('Connection error:', err);
    connections.delete(conn.peer);
    updateMpUi();
    addLog(`Ошибка соединения с ${conn.peer}: ${err.type || err.message}`, 'error');
  });
}

// Broadcast message to all connected peers
function broadcast(data){
  connections.forEach((conn) => {
    try{
      conn.send(data);
    } catch(e){
      console.error('Failed to send:', e);
    }
  });
}

// Handle incoming data
function handleIncomingData(data){
  console.log('Received:', data);
  
  switch(data.type){
    case 'request_sync':
      // Host: send full state to new client
      if(isHost){
        addLog(`Запрос синхронизации от клиента ${data.peerId || 'неизвестен'}`, 'info');
        sendFullSync(data.peerId);
      }
      break;
      
    case 'sync_all':
      // Client: receive full state from host
      if(!isHost){
        applyFullSync(data);
      }
      break;
      
    case 'new_element':
      // New element from peer
      if(!isRemoteUpdate){
        isRemoteUpdate = true;
        createElementFromData(data.element);
        isRemoteUpdate = false;
      }
      break;
      
    case 'delete_element':
      // Delete element from peer
      if(!isRemoteUpdate){
        isRemoteUpdate = true;
        deleteElementById(data.id);
        isRemoteUpdate = false;
      }
      break;
      
    case 'viewport_change':
      // Viewport change from host
      if(!isHost){
        panX = data.panX;
        panY = data.panY;
        zoom = data.zoom;
        updateTransform();
        addLog(`Вьюпорт изменен хостом: зум=${Math.round(zoom*100)}%, панорама=(${Math.round(panX)},${Math.round(panY)})`, 'info');
      }
      break;
      
    default:
      addLog(`Получено неизвестное сообщение: ${data.type}`, 'warning');
  }
}

// Send full state sync to a client
function sendFullSync(targetPeerId){
  const syncData = {
    type: 'sync_all',
    elements: elements.map(el => ({
      id: el.id,
      type: el.type,
      data: el.data,
      label: el.label || ''
    })),
    viewport: {
      zoom: zoom,
      panX: panX,
      panY: panY
    }
  };
  
  addLog(`Отправка синхронизации клиенту ${targetPeerId}: ${syncData.elements.length} элементов, вьюпорт: зум=${Math.round(zoom*100)}%, панорама=(${Math.round(panX)},${Math.round(panY)})`, 'info');
  
  const conn = connections.get(targetPeerId);
  if(conn){
    conn.send(syncData);
  }
}

// Apply full state sync
function applyFullSync(data){
  const elementsData = data.elements || data;
  const viewportData = data.viewport;
  
  // Clear current elements
  while(elemGroup.firstChild) elemGroup.removeChild(elemGroup.firstChild);
  elements = [];
  
  // Rebuild from sync data
  elementsData.forEach(elData => {
    let g = null;
    switch(elData.type){
      case 'flex-arrow':
      case 'flex-arrow-dash':
        g = buildFlexArrow(elData.data.points, elData.type === 'flex-arrow-dash', elData.data.color);
        break;
      case 'wide-arrow':
        g = buildWideArrow(elData.data.points, elData.data.color);
        break;
      case 'line':
        g = buildLine(elData.data.start, elData.data.end, elData.data.color);
        break;
      case 'measure':
        g = buildMeasure(elData.data.start, elData.data.end, elData.data.color);
        break;
      case 'area':
        g = buildArea(elData.data.points, elData.data.color);
        break;
      case 'boundary':
        g = buildBoundary(elData.data.points, elData.data.color);
        break;
      case 'marker':
        g = buildMarker(elData.data.points, elData.data.color);
        break;
      case 'text':
        g = buildTextNote(elData.data, elData.data.color);
        break;
      case 'point':
        g = buildPoint({x: elData.data.x, y: elData.data.y}, elData.data.color);
        break;
      case 'symbol':
        g = buildSymbol(elData.data.symbol, {x: elData.data.x, y: elData.data.y}, elData.data.color, elData.data.scale);
        break;
      case 'mine':
        g = buildMineField(elData.data.points, elData.data.color);
        break;
      case 'trench':
        g = buildTrench(elData.data.points, elData.data.color);
        break;
    }
    
    if(g){
      registerEl(g, elData.id);
      if(elData.label) g.setAttribute('data-label', elData.label);
      elemGroup.appendChild(g);
      elements.push({id: elData.id, type: elData.type, data: elData.data, el: g, label: elData.label || ''});
    }
  });
  
  // Apply viewport if provided
  if(viewportData){
    panX = viewportData.panX;
    panY = viewportData.panY;
    zoom = viewportData.zoom;
    updateTransform();
    addLog(`Применен вьюпорт от хоста: зум=${Math.round(zoom*100)}%, панорама=(${Math.round(panX)},${Math.round(panY)})`, 'info');
  }
  
  if(isHost) updateWideArrowMerges();
  addLog(`Получена синхронизация от хоста: ${elements.length} элементов`, 'success');
  showToast(`Синхронизировано: ${elements.length} элементов`, 'success');
}

      break;
    case 'wide-arrow':
      g = buildWideArrow(elData.data.points, elData.data.color);
      break;

      g = buildLine(elData.data.start, elData.data.end, elData.data.color);

      break;
    case 'area':
      g = buildArea(elData.data.points, elData.data.color);
      break;
    case 'boundary':
      g = buildBoundary(elData.data.points, elData.data.color);
      break;
    case 'marker':
      g = buildMarker(elData.data.points, elData.data.color);
      break;
    case 'text':
      g = buildTextNote(elData.data, elData.data.color);
      break;
    case 'point':
      g = buildPoint({x: elData.data.x, y: elData.data.y}, elData.data.color);
      break;
    case 'symbol':
      g = buildSymbol(elData.data.symbol, {x: elData.data.x, y: elData.data.y}, elData.data.color, elData.data.scale);
      break;
    case 'mine':
      g = buildMineField(elData.data.points, elData.data.color);
      break;
    case 'trench':
      g = buildTrench(elData.data.points, elData.data.color);
      break;
  }
  
  if(g){
    registerEl(g, elData.id);
    if(elData.label) g.setAttribute('data-label', elData.label);
    elemGroup.appendChild(g);
    elements.push({id: elData.id, type: elData.type, data: elData.data, el: g, label: elData.label || ''});
    addLog(`Получен элемент от сети: ID=${elData.id}, тип=${elData.type}`, 'success');
    if(isHost && elData.type === 'wide-arrow') updateWideArrowMerges();
  }
}

// Delete element by ID (network version)
function deleteElementById(id){
  const idx = elements.findIndex(el => el.id === id);
  if(idx >= 0){
    const elType = elements[idx].type;
    const elData = JSON.stringify(elements[idx].data);
    addLog(`Удален элемент (сеть): ID=${id}, тип=${elType}`, 'warning');
    elements[idx].el.remove();
    elements.splice(idx, 1);
    selectedIds.delete(id);
    if(isHost) updateWideArrowMerges();
  }
}

// Broadcast new element
function broadcastNewElement(element){
  if(isRemoteUpdate) return; // Don't broadcast if this came from network
  if(connections.size === 0) return;
  
  addLog(`Отправка элемента: ID=${element.id}, тип=${element.type}`, 'info');
  
  broadcast({
    type: 'new_element',
    element: {
      id: element.id,
      type: element.type,
      data: element.data,
      label: element.label || ''
    }
  });
}

// Broadcast delete element
function broadcastDeleteElement(id){
  if(isRemoteUpdate) return;
  if(connections.size === 0) return;
  
  addLog(`Отправка удаления: ID=${id}`, 'info');
  
  broadcast({
    type: 'delete_element',
    id: id
  });
}

// Check for room in URL on load
function checkRoomOnLoad(){
  const roomParam = getUrlParam('room');
  if(roomParam){
    roomId = roomParam;
    // Determine if we're host by checking if we have this ID
    // For simplicity, first visitor becomes host
    // In production, you'd use a signaling server
    isHost = true; // Assume host for now
    initPeer(roomId);
    showToast(`Загружена комната: ${roomId}`, 'success');
  }
}

// ─── SYMBOL DEFINITIONS ──────────────────────────────────────────────────
function symSVG(sym,color){
  const s=14,sw=1.2;
  const rect=`<rect x="${-s}" y="${-s*.75}" width="${s*2}" height="${s*1.5}" fill="none" stroke="${color}" stroke-width="${sw}" rx="1"/>`;
  const ell=`<ellipse cx="0" cy="0" rx="${s*.9}" ry="${s*.65}" fill="none" stroke="${color}" stroke-width="${sw}"/>`;
  const cx=(ax,ay,bx,by)=>`<line x1="${ax}" y1="${ay}" x2="${bx}" y2="${by}" stroke="${color}" stroke-width="${sw}"/>`;
  switch(sym){
    case 'tank': return rect+cx(-s+2,-s*.25,s-2,-s*.25)+cx(-s+2,s*.25,s-2,s*.25)+`<rect x="${-s*.3}" y="${-s*.75}" width="${s*.6}" height="${s*.3}" fill="none" stroke="${color}" stroke-width="${sw}" rx="1"/>`;
    case 'armour': return rect+cx(-s*.5,-s*.5,s*.5,s*.5)+cx(s*.5,-s*.5,-s*.5,s*.5);
    case 'infantry': return rect+cx(-s*.35,-s*.5,s*.35,s*.5)+cx(s*.35,-s*.5,-s*.35,s*.5);
    case 'motorized': return rect+`<circle cx="0" cy="0" r="${s*.45}" fill="none" stroke="${color}" stroke-width="${sw}"/><circle cx="0" cy="0" r="${s*.15}" fill="${color}"/>`;
    case 'mech_inf': return rect+cx(-s*.35,-s*.5,s*.35,s*.5)+cx(s*.35,-s*.5,-s*.35,s*.5)+`<circle cx="0" cy="0" r="${s*.22}" fill="none" stroke="${color}" stroke-width="${sw}"/>`;
    case 'arty': return ell+cx(-s*.9,0,s*.9,0);
    case 'missile': return ell+cx(-s*.9,0,s*.9,0)+cx(0,-s*.65,0,s*.65);
    case 'hq': return rect+cx(-s+2,-s*.75,-s+2,s*.75)+cx(-s+2,-s*.75,s*.2,-s*.75)+cx(s*.2,-s*.75,s*.2,s*.1);
    case 'recon': return rect+`<circle cx="0" cy="0" r="${s*.45}" fill="none" stroke="${color}" stroke-width="${sw}"/><circle cx="0" cy="0" r="${s*.15}" fill="${color}"/>`;
    case 'atgm': return rect+cx(-s*.5,0,s*.6,0)+`<polygon points="${s*.6},${-s*.25} ${s*.9},0 ${s*.6},${s*.25}" fill="${color}"/>`;
    case 'sam': return rect+cx(0,-s*.55,0,s*.55)+cx(-s*.4,0,s*.4,0);
    case 'engineer': return rect+cx(-s*.4,-s*.35,s*.4,s*.35)+cx(s*.4,-s*.35,-s*.4,s*.35)+cx(0,s*.35,0,s*.65);
    case 'medical': return rect+`<line x1="0" y1="${-s*.5}" x2="0" y2="${s*.5}" stroke="${color}" stroke-width="${sw+.8}"/><line x1="${-s*.45}" y1="0" x2="${s*.45}" y2="0" stroke="${color}" stroke-width="${sw+.8}"/>`;
    case 'mortar': return ell+cx(0,-s*.65,0,s*.65)+cx(-s*.3,0,s*.3,0);
    case 'support': return rect+`<circle cx="0" cy="0" r="${s*.35}" fill="none" stroke="${color}" stroke-width="${sw}"/>`;
    case 'maint': return rect+`<polygon points="0,${-s*.5} ${s*.45},0 0,${s*.5} ${-s*.45},0" fill="none" stroke="${color}" stroke-width="${sw}"/>`;
    case 'ew': return rect+`<path d="M${-s*.5} 0 Q${-s*.35},${-s*.4} ${-s*.2} 0 Q${-s*.05},${s*.4} 0 0 Q${s*.05},${-s*.4} ${s*.2} 0 Q${s*.35},${s*.4} ${s*.5} 0" fill="none" stroke="${color}" stroke-width="${sw}"/>`;
    case 'uav': return `<polygon points="0,${-s*.65} ${s*.85},0 0,${s*.65} ${-s*.85},0" fill="none" stroke="${color}" stroke-width="${sw}"/><circle cx="0" cy="0" r="${s*.22}" fill="${color}"/>`;
    case 'contam': return `<ellipse cx="0" cy="0" rx="${s*.9}" ry="${s*.65}" fill="${color}" fill-opacity=".2" stroke="${color}" stroke-width="${sw}"/><text x="0" y="${s*.12}" text-anchor="middle" font-size="${s*.85}" fill="${color}" font-weight="bold">G</text>`;
    case 'installation': return `<rect x="${-s*.85}" y="${-s*.6}" width="${s*1.7}" height="${s*1.2}" fill="none" stroke="${color}" stroke-width="${sw}"/>` +cx(-s*.85,0,s*.85,0)+cx(0,-s*.6,0,s*.6);
    default: return `<circle cx="0" cy="0" r="${s}" fill="none" stroke="${color}" stroke-width="${sw}"/>`;
  }
}

/** Create SVG element from symbol string safely using DOMParser */
function createSymPreview(){
  removeSymPreview();
  if(!currentSymbol) return;
  symPreview = NS('g'); 
  symPreview.setAttribute('opacity', '0.55'); 
  symPreview.setAttribute('pointer-events', 'none');
  
  // Use DOMParser for safer HTML parsing instead of innerHTML
  const svgString = '<svg xmlns="http://www.w3.org/2000/svg">' + symSVG(currentSymbol, getColor()) + '</svg>';
  const parser = new DOMParser();
  const doc = parser.parseFromString(svgString, 'image/svg+xml');
  const content = doc.querySelector('svg');
  if(content){
    while(content.firstChild) symPreview.appendChild(content.firstChild);
  }
  previewGrp.appendChild(symPreview);
}
function refreshSymPreviewPos(worldPt){
  if(!symPreview) return;
  const pt=worldPt||lastWorldMouse; if(!pt) return;
  const sp=toScreen(pt); symPreview.setAttribute('transform',`translate(${sp.x},${sp.y})`);
}
function removeSymPreview(){ if(symPreview){symPreview.remove();symPreview=null;} }

function updateImageInteractivity(){

function attachImageEvents(svgImg,obj){
  svgImg.classList.add('map-image');
  svgImg.addEventListener('mousedown',e=>{
    if(currentTool!=='select'||e.button!==0) return;
    e.stopPropagation();
    clearSelection();
    selectImage(obj.id);
    saveHistory();
    const p=getSvgPt(e); imgDrag={obj,ox:obj.cx,oy:obj.cy,sx:p.x,sy:p.y};
  });
}

function addImage(dataUrl,cx,cy){
  const img=new Image();
  img.onload=()=>{
    const svgImg=NS('image'); svgImg.setAttribute('href',dataUrl);
    const w=img.naturalWidth, h=img.naturalHeight;
    svgImg.setAttribute('width',w); svgImg.setAttribute('height',h);
    svgImg.setAttribute('x',cx-w/2); svgImg.setAttribute('y',cy-h/2);
    svgImg.setAttribute('preserveAspectRatio','none');
    const obj={id:imgNextId++,origW:w,origH:h,cx,cy,w,h,el:svgImg,dataUrl};
    saveHistory();
    images.push(obj); imgGrp.appendChild(svgImg);
    attachImageEvents(svgImg,obj);
    updateImageInteractivity();
    updateStatus();
    showToast('Изображение добавлено','success');
  };
  img.src=dataUrl;
}

function showImageBorder(){

  b.setAttribute('x',im.cx-im.w/2); b.setAttribute('y',im.cy-im.h/2);

  b.setAttribute('stroke-width', Math.max(1, 1)); b.setAttribute('stroke-dasharray',`${Math.max(5, 5)},${Math.max(3, 3)}`);
  b.setAttribute('pointer-events','none'); b.id='imgBorder';
  imgGrp.appendChild(b);
  [{x:im.cx-im.w/2,y:im.cy-im.h/2},{x:im.cx+im.w/2,y:im.cy-im.h/2},
   {x:im.cx-im.w/2,y:im.cy+im.h/2},{x:im.cx+im.w/2,y:im.cy+im.h/2}].forEach((corner,ci)=>{

function pasteFromClipboard(){
  if(navigator.clipboard&&navigator.clipboard.read){
    navigator.clipboard.read().then(items=>{
      for(const item of items) for(const type of item.types) if(type.startsWith('image/')){
        item.getType(type).then(blob=>{
          const r=new FileReader(); r.onload=ev=>addImage(ev.target.result,-panX/zoom,-panY/zoom); r.readAsDataURL(blob);
        });
      }
    }).catch(()=>showToast('Нажмите Ctrl+V на холсте','error'));
  }
}

    if(item.type.indexOf('image')!==-1){ const r=new FileReader(); r.onload=ev=>addImage(ev.target.result,-panX/zoom,-panY/zoom); r.readAsDataURL(item.getAsFile()); break; }

function restoreImage(imData){
  if(!imData||!imData.dataUrl) return null;
  const svgImg=NS('image');
  const w=finiteNumber(imData.w||imData.origW,800), h=finiteNumber(imData.h||imData.origH,600);
  const cx=finiteNumber(imData.cx,0), cy=finiteNumber(imData.cy,0);
  svgImg.setAttribute('href',imData.dataUrl);
  svgImg.setAttribute('width',w); svgImg.setAttribute('height',h);
  svgImg.setAttribute('x',cx-w/2); svgImg.setAttribute('y',cy-h/2);
  svgImg.setAttribute('preserveAspectRatio','none');
  const rawId=Number(imData.id);
  const id=Number.isFinite(rawId)&&rawId>0?rawId:imgNextId++;
  const obj={id,origW:finiteNumber(imData.origW,w),origH:finiteNumber(imData.origH,h),cx,cy,w,h,el:svgImg,dataUrl:imData.dataUrl};
  images.push(obj); imgGrp.appendChild(svgImg); attachImageEvents(svgImg,obj);
